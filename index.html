<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="COURT">
<meta name="theme-color" content="#0a0a0a">
<title>COURT — NBA Intel</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg:       #0a0a0a;
  --bg2:      #111111;
  --bg3:      #1a1a1a;
  --surface:  #141414;
  --surface2: #1e1e1e;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.13);

  --take:        #00d68f;
  --take-bg:     rgba(0,214,143,0.08);
  --take-border: rgba(0,214,143,0.18);

  --avoid:        #ff4060;
  --avoid-bg:     rgba(255,64,96,0.08);
  --avoid-border: rgba(255,64,96,0.18);

  --risky:        #ffaa00;
  --risky-bg:     rgba(255,170,0,0.08);
  --risky-border: rgba(255,170,0,0.18);

  --accent:  #6c63ff;
  --accent2: #4f46e5;
  --live:    #ff4060;

  --text:  #f0f0f0;
  --text2: #888888;
  --text3: #444444;

  --display: 'Syne', sans-serif;
  --mono:    'JetBrains Mono', monospace;
  --body:    'Inter', sans-serif;

  --r:    12px;
  --r-sm: 8px;
  --r-lg: 18px;
}

*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  min-height: 100dvh;
  font-size: 14px;
  line-height: 1.5;
  overflow-x: hidden;
}

/* ── HEADER ── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,10,0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  padding-top: env(safe-area-inset-top);
  height: calc(52px + env(safe-area-inset-top));
  display: flex;
  align-items: flex-end;
  padding-bottom: 10px;
  justify-content: space-between;
}

.logo {
  font-family: var(--display);
  font-size: 20px;
  font-weight: 800;
  letter-spacing: 0.15em;
  display: flex;
  align-items: center;
  gap: 7px;
}

.logo-pulse {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--take);
  box-shadow: 0 0 8px var(--take);
  animation: pulse 2.5s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { opacity:1; box-shadow: 0 0 8px var(--take); }
  50%      { opacity:0.4; box-shadow: none; }
}

.refresh-btn {
  display: flex; align-items: center; gap: 5px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 50px;
  padding: 6px 12px;
  font-family: var(--body);
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s;
}
.refresh-btn:hover { color: var(--text); border-color: var(--border2); }
.refresh-btn svg { width:12px; height:12px; }
.refresh-btn.spinning svg { animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── MAIN ── */
main {
  max-width: 600px;
  margin: 0 auto;
  padding: 16px 12px 100px;
}

/* ── PAGE TITLE ── */
.page-title { margin-bottom: 20px; }
.page-title h1 {
  font-family: var(--display);
  font-size: 26px;
  font-weight: 800;
  letter-spacing: 0.04em;
  line-height: 1;
  margin-bottom: 4px;
}
.page-meta { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 10px; }
.meta-dot { color: var(--text3); }

/* ── DATE GROUP HEADER ── */
.date-group { margin-bottom: 6px; }
.date-group-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 14px 0 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.date-group-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── GAME CARD ── */
.game-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color 0.2s;
  cursor: pointer;
}
.game-card:hover { border-color: var(--border2); }
.game-card.active { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(108,99,255,0.15); }

.card-top { padding: 14px 14px 12px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.card-teams { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
.team-row { display: flex; align-items: center; gap: 8px; }
.team-logo-wrap { width: 28px; height: 28px; flex-shrink: 0; }
.team-logo-wrap img { width: 28px; height: 28px; border-radius: 50%; object-fit: contain; background: var(--bg3); padding: 2px; }
.team-logo-fb { width: 28px; height: 28px; border-radius: 50%; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 8px; color: var(--text3); }
.team-name-col { flex: 1; min-width: 0; }
.team-name { font-family: var(--display); font-size: 15px; font-weight: 700; letter-spacing: 0.04em; line-height: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.team-record-label { font-size: 10px; color: var(--text3); margin-top: 2px; font-family: var(--mono); }

.vs-line { display: flex; align-items: center; gap: 6px; padding-left: 36px; }
.vs-line::before { content: ''; flex: 1; height: 1px; background: var(--border); max-width: 16px; }
.at-label { font-family: var(--mono); font-size: 9px; color: var(--text3); }

.card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
.countdown-block { text-align: right; }
.countdown-timer { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--text); letter-spacing: 0.05em; line-height: 1; }
.countdown-label { font-size: 9px; color: var(--text3); font-family: var(--mono); margin-top: 2px; }
.score-display { font-family: var(--display); font-size: 18px; font-weight: 700; letter-spacing: 0.04em; line-height: 1; }

.status-pill { font-family: var(--mono); font-size: 9px; font-weight: 500; padding: 3px 8px; border-radius: 50px; text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
.pill-pre    { background: rgba(108,99,255,0.1); color: var(--accent); }
.pill-live   { background: var(--avoid-bg); color: var(--live); animation: blink 1.5s infinite; }
.pill-final  { background: var(--bg3); color: var(--text3); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }
.ist-time { font-size: 10px; color: var(--text3); font-family: var(--mono); text-align: right; }

/* ── EXPANDED PANEL ── */
.game-panel { display: none; border-top: 1px solid var(--border); background: var(--bg2); }
.game-card.active .game-panel { display: block; }
.tabs { display: flex; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); padding: 0 14px; }
.tabs::-webkit-scrollbar { display: none; }
.tab { font-size: 12px; font-weight: 500; color: var(--text3); padding: 10px 12px; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
.tab:hover { color: var(--text2); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.pane { display: none; padding: 14px; }
.pane.active { display: block; }

/* ── INJURY / LINEUP GRID ── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.col-head { font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); padding-bottom: 8px; margin-bottom: 6px; border-bottom: 1px solid var(--border); }
.p-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; border-radius: var(--r-sm); border: 1px solid var(--border); background: var(--surface); gap: 6px; margin-bottom: 4px; }
.p-row.starter { border-left: 2px solid var(--accent); }
.p-left { display: flex; align-items: center; gap: 6px; min-width: 0; flex: 1; }
.p-pos { font-family: var(--mono); font-size: 8px; color: var(--text3); background: var(--bg3); padding: 2px 4px; border-radius: 3px; flex-shrink: 0; }
.p-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.s-tag { font-family: var(--mono); font-size: 8px; font-weight: 600; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; flex-shrink: 0; }
.s-out  { background: var(--avoid-bg); color: var(--avoid); border: 1px solid var(--avoid-border); }
.s-q    { background: var(--risky-bg); color: var(--risky); border: 1px solid var(--risky-border); }
.s-p    { background: var(--take-bg);  color: var(--take);  border: 1px solid var(--take-border); }
.s-gtd  { background: var(--risky-bg); color: var(--risky); border: 1px solid var(--risky-border); }
.s-ok   { background: rgba(108,99,255,0.08); color: var(--accent); border: 1px solid rgba(108,99,255,0.15); }

.add-btn { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--border2); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text3); transition: all 0.15s; flex-shrink: 0; }
.add-btn:hover { background: var(--accent2); border-color: var(--accent2); color: white; }

/* ── PROJECTIONS ── */
.data-badge { font-family: var(--mono); font-size: 9px; color: var(--text3); background: var(--bg3); padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 12px; letter-spacing: 0.08em; }
.verdict-card { border-radius: var(--r); border: 1px solid var(--border); overflow: hidden; margin-bottom: 8px; }
.verdict-card.take  { border-color: var(--take-border);  background: var(--take-bg); }
.verdict-card.avoid { border-color: var(--avoid-border); background: var(--avoid-bg); }
.verdict-card.risky { border-color: var(--risky-border); background: var(--risky-bg); }
.verdict-top { display: flex; align-items: center; justify-content: space-between; padding: 11px 12px; cursor: pointer; gap: 8px; }
.v-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
.v-icon { font-size: 16px; flex-shrink: 0; }
.v-player { min-width: 0; }
.v-name { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.v-sub { font-family: var(--mono); font-size: 9px; color: var(--text2); }
.v-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.v-verdict { font-family: var(--display); font-size: 13px; font-weight: 700; letter-spacing: 0.08em; }
.take  .v-verdict { color: var(--take); }
.avoid .v-verdict { color: var(--avoid); }
.risky .v-verdict { color: var(--risky); }
.v-conf { font-family: var(--mono); font-size: 10px; color: var(--text2); }
.chevron { color: var(--text3); transition: transform 0.2s; flex-shrink: 0; }
.verdict-card.open .chevron { transform: rotate(180deg); }
.verdict-detail { display: none; padding: 0 12px 12px; border-top: 1px solid rgba(255,255,255,0.05); }
.verdict-card.open .verdict-detail { display: block; }

.prop-rows { display: flex; flex-direction: column; gap: 5px; margin: 10px 0; }
.prop-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 9px; background: rgba(0,0,0,0.2); border-radius: var(--r-sm); gap: 6px; }
.prop-lbl { font-size: 11px; color: var(--text2); flex: 1; }
.prop-vals { display: flex; align-items: center; gap: 8px; }
.prop-num { font-family: var(--mono); font-size: 11px; color: var(--text2); text-align: right; }
.prop-num span { display: block; font-size: 8px; color: var(--text3); }
.prop-tag { font-family: var(--mono); font-size: 8px; font-weight: 600; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; width: 44px; text-align: center; }
.tag-take  { background: var(--take-bg);  color: var(--take);  border: 1px solid var(--take-border); }
.tag-avoid { background: var(--avoid-bg); color: var(--avoid); border: 1px solid var(--avoid-border); }
.tag-risky { background: var(--risky-bg); color: var(--risky); border: 1px solid var(--risky-border); }
.tag-na    { background: var(--bg3); color: var(--text3); border: 1px solid var(--border); }

.why-block { background: rgba(0,0,0,0.2); border-radius: var(--r-sm); padding: 10px; margin-top: 8px; }
.why-title { font-family: var(--mono); font-size: 8px; letter-spacing: 0.12em; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; }
.why-item { display: flex; align-items: flex-start; gap: 6px; font-size: 11px; color: var(--text2); line-height: 1.5; padding: 2px 0; }
.why-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text3); margin-top: 5px; flex-shrink: 0; }
.why-item.pos .why-dot { background: var(--take); }
.why-item.neg .why-dot { background: var(--avoid); }
.why-item.neu .why-dot { background: var(--risky); }

.add-prop-btn { width: 100%; margin-top: 8px; padding: 8px; background: none; border: 1px solid var(--border2); border-radius: var(--r-sm); font-family: var(--body); font-size: 12px; font-weight: 500; color: var(--text2); cursor: pointer; transition: all 0.15s; }
.add-prop-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── INTEL BLOCKS ── */
.intel-list { display: flex; flex-direction: column; gap: 10px; }
.intel-block { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 12px; }
.intel-block-title { font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; padding-bottom: 7px; border-bottom: 1px solid var(--border); }
.log-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); gap: 6px; font-size: 11px; }
.log-row:last-child { border-bottom: none; }
.log-date { font-family: var(--mono); font-size: 9px; color: var(--text3); flex-shrink: 0; }
.log-matchup { color: var(--text2); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.log-result { font-family: var(--mono); font-size: 10px; font-weight: 600; flex-shrink: 0; }
.log-result.win { color: var(--take); }
.log-result.loss { color: var(--avoid); }
.log-score { font-family: var(--mono); font-size: 10px; color: var(--text2); flex-shrink: 0; }

/* ── PARLAY FLOAT ── */
.parlay-float { position: fixed; bottom: calc(16px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%) translateY(100px); z-index: 200; background: var(--text); border-radius: 50px; padding: 11px 18px; display: flex; align-items: center; gap: 10px; cursor: pointer; box-shadow: 0 8px 32px rgba(0,0,0,0.5); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap; max-width: calc(100vw - 24px); }
.parlay-float.show { transform: translateX(-50%) translateY(0); }
.parlay-badge { background: var(--avoid); color: white; font-family: var(--mono); font-size: 11px; font-weight: 600; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.parlay-float-text { color: var(--bg); font-weight: 600; font-size: 13px; flex: 1; }
.parlay-float-cta { background: var(--bg); color: var(--text); padding: 4px 10px; border-radius: 50px; font-size: 11px; font-weight: 600; flex-shrink: 0; }

/* ── MODALS / SHEETS ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 300; display: none; align-items: flex-end; }
.overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-width: 600px; margin: 0 auto; max-height: 88vh; overflow-y: auto; padding: 18px 14px calc(32px + env(safe-area-inset-bottom)); animation: slideUp 0.28s cubic-bezier(0.34,1.2,0.64,1); }
@keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-handle { width: 32px; height: 3px; background: var(--border2); border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-family: var(--display); font-size: 24px; font-weight: 800; letter-spacing: 0.04em; margin-bottom: 3px; }
.modal-sub { font-size: 11px; color: var(--text3); margin-bottom: 18px; font-style: italic; }

.parlay-leg { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: var(--bg2); border-radius: var(--r); border: 1px solid var(--border); margin-bottom: 6px; gap: 8px; }
.leg-info { flex: 1; min-width: 0; }
.leg-player { font-weight: 600; font-size: 13px; }
.leg-prop { font-family: var(--mono); font-size: 10px; color: var(--text2); }
.leg-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.remove-leg { background: none; border: none; cursor: pointer; color: var(--text3); padding: 3px; transition: color 0.15s; display: flex; }
.remove-leg:hover { color: var(--avoid); }

.parlay-analysis { background: var(--bg2); border-radius: var(--r); padding: 14px; margin-top: 14px; }
.a-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 5px 0; border-bottom: 1px solid var(--border); }
.a-row:last-child { border-bottom: none; }
.a-label { color: var(--text2); }
.a-verdict { margin-top: 12px; padding: 12px; border-radius: var(--r-sm); font-size: 13px; font-weight: 500; line-height: 1.5; }
.av-good { background: var(--take-bg);  color: var(--take);  border: 1px solid var(--take-border); }
.av-warn { background: var(--risky-bg); color: var(--risky); border: 1px solid var(--risky-border); }
.av-bad  { background: var(--avoid-bg); color: var(--avoid); border: 1px solid var(--avoid-border); }
.disclaimer { font-size: 10px; color: var(--text3); text-align: center; margin-top: 14px; font-style: italic; }

.prop-sheet { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); z-index: 400; display: none; align-items: flex-end; }
.prop-sheet.open { display: flex; }
.prop-sheet-inner { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-width: 600px; margin: 0 auto; padding: 18px 14px calc(32px + env(safe-area-inset-bottom)); max-height: 78vh; overflow-y: auto; animation: slideUp 0.25s cubic-bezier(0.34,1.2,0.64,1); }
.sheet-name { font-family: var(--display); font-size: 20px; font-weight: 700; letter-spacing: 0.04em; margin-bottom: 3px; }
.sheet-sub  { font-size: 11px; color: var(--text3); margin-bottom: 16px; font-family: var(--mono); }
.prop-option { display: flex; align-items: center; justify-content: space-between; padding: 11px 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); cursor: pointer; transition: border-color 0.15s; gap: 8px; margin-bottom: 5px; }
.prop-option:hover { border-color: var(--accent); }
.po-label { font-size: 13px; font-weight: 500; }
.po-v { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.cancel-sheet { margin-top: 8px; width: 100%; padding: 11px; background: none; border: 1px solid var(--border2); border-radius: var(--r); font-family: var(--body); font-size: 13px; color: var(--text3); cursor: pointer; }

/* ── LOADING / EMPTY ── */
.loading-block { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 16px; gap: 12px; }
.spinner { width: 24px; height: 24px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
.load-txt { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 0.1em; }
.empty-note { font-size: 12px; color: var(--text3); text-align: center; padding: 18px; font-style: italic; line-height: 1.6; }
.error-bar { background: var(--avoid-bg); border: 1px solid var(--avoid-border); border-radius: var(--r); padding: 10px 14px; color: var(--avoid); font-size: 12px; margin-bottom: 14px; display: none; }

/* ── RESPONSIVE ── */
@media (max-width: 380px) {
  .two-col { grid-template-columns: 1fr; }
  .modal-title { font-size: 20px; }
}
.fade { animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity:0; transform: translateY(4px); } to { opacity:1; transform: translateY(0); } }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-pulse"></div>COURT</div>
  <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <polyline points="23 4 23 10 17 10"></polyline>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
    </svg>
    Refresh
  </button>
</header>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CONFIG
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const CFG = {
  PROXY: 'https://court-proxy.vercel.app', // Update this to your exact Vercel URL
  ESPN:  'https://site.api.espn.com/apis/site/v2/sports/basketball/nba',
  REFRESH_SEC: 120
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// STATE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const S = {
  games: [], activeGame: null, gameCache: {}, playerCache: {},
  parlayLegs: [], countdowns: {}, refreshTimer: null, refreshInterval: null
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// TIME HELPERS (Fixed via Native Intl)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function toIST(date) {
  return new Date(date.toLocaleString("en-US", {timeZone: "Asia/Kolkata"}));
}

function istTimeStr(date) {
  return new Intl.DateTimeFormat('en-US', {
    timeZone: 'Asia/Kolkata', hour: 'numeric', minute: '2-digit', hour12: true
  }).format(date);
}

function istDateKey(date) {
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: 'Asia/Kolkata', year: 'numeric', month: 'numeric', day: 'numeric'
  }).formatToParts(date);
  const y = parts.find(p => p.type === 'year').value;
  const m = parts.find(p => p.type === 'month').value;
  const d = parts.find(p => p.type === 'day').value;
  return `${y}-${m}-${d}`;
}

function nowIST() { return toIST(new Date()); }

function friendlyDateIST(istDate) {
  const today = nowIST();
  const tomorrow = new Date(today.getTime() + 86400000);
  const days = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

  const td = today.getDate(), tm = today.getMonth(), ty = today.getFullYear();
  const nd = tomorrow.getDate(), nm = tomorrow.getMonth(), ny = tomorrow.getFullYear();
  const d = istDate.getDate(), mo = istDate.getMonth(), y = istDate.getFullYear();

  if (d === td && mo === tm && y === ty) return 'TODAY';
  if (d === nd && mo === nm && y === ny) return 'TOMORROW';
  return `${days[istDate.getDay()]}, ${months[mo]} ${d}`;
}

function espnDateStr(date) {
  const ist = toIST(date);
  const y = ist.getFullYear();
  const m = String(ist.getMonth()+1).padStart(2,'0');
  const d = String(ist.getDate()).padStart(2,'0');
  return `${y}${m}${d}`;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// COUNTDOWN
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function formatCountdown(ms) {
  if (ms <= 0) return 'STARTING';
  const totalSecs = Math.floor(ms / 1000);
  const s = totalSecs % 60, mi = Math.floor(totalSecs / 60) % 60, h = Math.floor(totalSecs / 3600) % 24, d = Math.floor(totalSecs / 86400);
  const ss = String(s).padStart(2,'0'), mms = String(mi).padStart(2,'0'), hs = String(h).padStart(2,'0');
  return d > 0 ? `${String(d).padStart(2,'0')}:${hs}:${mms}:${ss}` : `${hs}:${mms}:${ss}`;
}

function countdownLabel(ms) {
  if (ms <= 0) return '';
  return Math.floor(ms / 86400000) > 0 ? 'DD:HH:MM:SS' : 'HH:MM:SS';
}

function startCountdown(eventId, gameDate) {
  if (S.countdowns[eventId]) clearInterval(S.countdowns[eventId]);
  const el = document.getElementById(`cd-${eventId}`), lbl = document.getElementById(`cdl-${eventId}`);
  if (!el) return;
  function update() {
    const ms = gameDate.getTime() - new Date().getTime();
    if (el) el.textContent = formatCountdown(ms);
    if (lbl) lbl.textContent = countdownLabel(ms);
  }
  update();
  S.countdowns[eventId] = setInterval(update, 1000);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// FETCH HELPERS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function espnFetch(path) {
  const r = await fetch(`${CFG.ESPN}${path}`);
  if (!r.ok) throw new Error(`ESPN ${r.status}`);
  return r.json();
}
async function proxyFetch(path) {
  if (CFG.PROXY.includes('YOUR-RAILWAY')) return null;
  const r = await fetch(`${CFG.PROXY}${path}`);
  if (!r.ok) return null;
  return r.json();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// LOAD & RENDER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function loadGames() {
  try {
    document.getElementById('errorBar').style.display = 'none';
    const allGames = [];
    const now = new Date();
    let emptyStreak = 0;

    for (let i = 0; i <= 8; i++) {
      const d = new Date(now); d.setDate(now.getDate() + i);
      try {
        const data = await espnFetch(`/scoreboard?dates=${espnDateStr(d)}`);
        const events = (data.events || []).filter(ev => {
          const cs = ev.competitions?.[0]?.competitors || [];
          return cs.some(c => c.team?.abbreviation && c.team.abbreviation !== 'TBD');
        });
        if (events.length === 0) {
          emptyStreak++; if (emptyStreak >= 2) break;
        } else {
          emptyStreak = 0; events.forEach(ev => allGames.push(ev));
        }
      } catch(e) {}
    }
    S.games = allGames;
    document.getElementById('gamesCount').textContent = `${allGames.length} game${allGames.length !== 1 ? 's' : ''} upcoming`;
    document.getElementById('updatedAt').textContent = istTimeStr(new Date());
    renderGames();
  } catch(e) {
    document.getElementById('errorBar').style.display = 'block';
    if (S.games.length === 0) document.getElementById('gamesList').innerHTML = '<div class="empty-note">Could not load games. Check your connection.</div>';
  }
}

function renderGames() {
  const list = document.getElementById('gamesList');
  if (S.games.length === 0) { list.innerHTML = '<div class="empty-note">No upcoming NBA games found.</div>'; return; }
  list.innerHTML = '';
  const groups = {}, order = [];
  S.games.forEach(ev => {
    const key = istDateKey(new Date(ev.date));
    if (!groups[key]) { groups[key] = { istDate: toIST(new Date(ev.date)), events: [] }; order.push(key); }
    groups[key].events.push(ev);
  });
  order.forEach(key => {
    const g = groups[key], hdr = document.createElement('div');
    hdr.className = 'date-group-label'; hdr.textContent = friendlyDateIST(g.istDate);
    list.appendChild(hdr);
    g.events.forEach(ev => list.appendChild(makeCard(ev)));
  });
  if (S.activeGame) {
    const card = document.getElementById(`card-${S.activeGame}`);
    if (card) { card.classList.add('active'); loadPanel(S.activeGame); }
  }
  S.games.forEach(ev => {
    const status = ev.status?.type?.name || '';
    if (status !== 'STATUS_FINAL' && status !== 'STATUS_IN_PROGRESS') startCountdown(ev.id, new Date(ev.date));
  });
}

function makeCard(ev) {
  const comp = ev.competitions?.[0] || {}, cs = comp.competitors || [];
  const home = cs.find(c => c.homeAway === 'home') || cs[0] || {}, away = cs.find(c => c.homeAway === 'away') || cs[1] || {};
  const status = ev.status?.type, sName = status?.name || '', gameDate = new Date(ev.date);
  const isLive = sName === 'STATUS_IN_PROGRESS', isFinal = sName === 'STATUS_FINAL', isPre = !isLive && !isFinal;
  let pillClass = 'pill-pre', pillText = istTimeStr(gameDate) + ' IST';
  if (isLive) { pillClass = 'pill-live'; pillText = status?.shortDetail || 'LIVE'; }
  if (isFinal) { pillClass = 'pill-final'; pillText = 'FINAL'; }

  let rightHTML = isLive || isFinal ? `
    <div class="score-display">${away.score ?? '0'} – ${home.score ?? '0'}</div>
    <div class="status-pill ${pillClass}">${pillText}</div>` : `
    <div class="countdown-block"><div class="countdown-timer" id="cd-${ev.id}">--:--:--</div><div class="countdown-label" id="cdl-${ev.id}">HH:MM:SS</div></div>
    <div class="ist-time">${pillText}</div>`;

  function teamSide(team, isHomeTeam) {
    const abbr = team.team?.abbreviation || '?', logo = team.team?.logo || '', wins = team.records?.[0]?.summary?.split('-')[0] || '?', losses = team.records?.[0]?.summary?.split('-')[1] || '?', rec = team.records?.[0]?.summary || '';
    return `
      <div class="team-row">
        <div class="team-logo-wrap">${logo ? `<img src="${logo}" alt="${abbr}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="team-logo-fb" style="display:none">${abbr}</div>` : `<div class="team-logo-fb">${abbr}</div>`}</div>
        <div class="team-name-col"><div class="team-name">${abbr}</div>${rec ? `<div class="team-record-label">${wins}W · ${losses}L</div>` : ''}</div>
      </div>`;
  }

  const card = document.createElement('div'); card.className = 'game-card fade'; card.id = `card-${ev.id}`;
  card.innerHTML = `
    <div class="card-top" onclick="toggleCard('${ev.id}')">
      <div class="card-teams">${teamSide(away, false)}<div class="vs-line"><span class="at-label">@ ${home.team?.abbreviation || 'HOME'}</span></div>${teamSide(home, true)}</div>
      <div class="card-right">${rightHTML}</div>
    </div>
    <div class="game-panel" id="panel-${ev.id}">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('${ev.id}','inj',this)">Injuries</div>
        <div class="tab" onclick="switchTab('${ev.id}','lineups',this)">Lineups</div>
        <div class="tab" onclick="switchTab('${ev.id}','proj',this)">Projections</div>
        <div class="tab" onclick="switchTab('${ev.id}','venue',this)">Venue & H2H</div>
        <div class="tab" onclick="switchTab('${ev.id}','intel',this)">Game Intel</div>
      </div>
      <div id="pane-inj-${ev.id}" class="pane active"><div class="loading-block"><div class="spinner"></div><div class="load-txt">LOADING...</div></div></div>
      <div id="pane-lineups-${ev.id}" class="pane"></div>
      <div id="pane-proj-${ev.id}" class="pane"></div>
      <div id="pane-venue-${ev.id}" class="pane"></div>
      <div id="pane-intel-${ev.id}" class="pane"></div>
    </div>`;
  return card;
}

function toggleCard(id) {
  const card = document.getElementById(`card-${id}`); const wasActive = card.classList.contains('active');
  document.querySelectorAll('.game-card.active').forEach(c => c.classList.remove('active')); S.activeGame = null;
  if (!wasActive) { card.classList.add('active'); S.activeGame = id; loadPanel(id); history.pushState({ gameOpen: id }, ''); setTimeout(() => card.scrollIntoView({behavior:'smooth', block:'nearest'}), 50); }
}
window.addEventListener('popstate', () => { if (S.activeGame) { document.getElementById(`card-${S.activeGame}`)?.classList.remove('active'); S.activeGame = null; } });
function switchTab(gameId, tab, el) { el.closest('.tabs').querySelectorAll('.tab').forEach(t => t.classList.remove('active')); el.classList.add('active'); document.querySelectorAll(`#panel-${gameId} .pane`).forEach(p => p.classList.remove('active')); document.getElementById(`pane-${tab}-${gameId}`).classList.add('active'); }

async function loadPanel(id) {
  const cached = S.gameCache[id]; if (cached && (Date.now() - cached.ts) < 90000) { renderPanel(id, cached.data); return; }
  try {
    const data = await espnFetch(`/summary?event=${id}`); S.gameCache[id] = { data, ts: Date.now() };
    renderPanel(id, data); loadNBAStats(id, data);
  } catch(e) { document.getElementById(`pane-inj-${id}`).innerHTML = '<div class="empty-note">Could not load game details.</div>'; }
}

function renderPanel(id, data) { renderInjuries(id, data); renderLineups(id, data); renderProjections(id, data); renderVenue(id, data); renderIntel(id, data); }

function renderInjuries(id, data) {
  const el = document.getElementById(`pane-inj-${id}`), comps = data.header?.competitions?.[0]?.competitors || [], injuries = data.injuries || [];
  if (injuries.length < 2) { el.innerHTML = `<div class="empty-note">No injury report yet.<br>Updates drop ~90 min before tip-off.</div>`; return; }
  let html = `<div class="two-col">`;
  injuries.forEach((teamInj, i) => {
    const list = teamInj.injuries || []; html += `<div><div class="col-head">${comps[i]?.team?.shortDisplayName || `Team ${i+1}`}</div>`;
    if (list.length === 0) html += `<div style="font-size:11px;color:var(--take);padding:6px 0">No injuries ✓</div>`;
    else list.forEach(inj => {
      const st = inj.status || '';
      html += `<div class="p-row"><div class="p-left"><span class="p-pos">${inj.athlete?.position?.abbreviation || '?'}</span><span class="p-name">${inj.athlete?.shortName || '?'}</span></div><span class="s-tag ${sCls(st)}">${sFmt(st)}</span></div>`;
      if (inj.shortComment) html += `<div style="font-size:10px;color:var(--text3);padding:0 10px 5px;font-style:italic">${inj.shortComment}</div>`;
    });
    html += `</div>`;
  });
  el.innerHTML = html + `</div>`;
}
function sCls(s) { const l = s.toLowerCase(); if (l.includes('out')) return 's-out'; if (l.includes('question')) return 's-q'; if (l.includes('probable')) return 's-p'; if (l.includes('day')) return 's-gtd'; return 's-ok'; }
function sFmt(s) { const m = {Active:'OK',Out:'OUT',Questionable:'QUEST.',Probable:'PROB.','Day-To-Day':'GTD'}; return m[s] || s.slice(0,5).toUpperCase(); }

function renderLineups(id, data) {
  const el = document.getElementById(`pane-lineups-${id}`), boxTeams = data.boxscore?.teams || [];
  if (boxTeams.length < 2) { el.innerHTML = `<div class="empty-note">Lineups drop 30–60 min before tip-off.</div>`; return; }
  let html = `<div class="two-col">`;
  boxTeams.forEach(team => {
    const athletes = team.athletes || [], starters = athletes.filter(a => a.starter), bench = athletes.filter(a => !a.starter).slice(0,8);
    html += `<div><div class="col-head">${team.team?.shortDisplayName || 'Team'}</div>`;
    if (starters.length > 0) {
      html += `<div style="font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:.1em;margin-bottom:4px;text-transform:uppercase">Starters</div>`;
      starters.forEach(a => { html += `<div class="p-row starter"><div class="p-left"><span class="p-pos">${a.athlete?.position?.abbreviation||'?'}</span><span class="p-name">${a.athlete?.shortName||'?'}</span></div></div>`; });
    }
    if (bench.length > 0) {
      html += `<div style="font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:.1em;margin:8px 0 4px;text-transform:uppercase">Bench</div>`;
      bench.forEach(a => { html += `<div class="p-row"><div class="p-left"><span class="p-pos">${a.athlete?.position?.abbreviation||'?'}</span><span class="p-name">${a.athlete?.shortName||'?'}</span></div></div>`; });
    }
    html += `</div>`;
  });
  el.innerHTML = html + `</div>`;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// FIXED PROJECTIONS & PROXY LOGIC
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderProjections(id, data) {
  const el = document.getElementById(`pane-proj-${id}`);
  if (S.playerCache[id]) { renderFullProj(id, data, S.playerCache[id]); return; }

  const boxTeams = data.boxscore?.teams || [];
  if (boxTeams.length < 2) { el.innerHTML = `<div class="empty-note">Awaiting Roster Data.</div>`; return; }

  let players = [];
  boxTeams.forEach(t => (t.athletes||[]).forEach(a => { if ((a.stats||[]).length > 0) players.push({athlete:a.athlete, team:t.team, stats:a.stats, starter:a.starter}); }));

  // FIX: Bypass the starter lock
  let targets = players.filter(p => p.starter);
  if (targets.length === 0) targets = players.slice(0, 8); // Fallback to top roster players

  if (targets.length === 0) { el.innerHTML = `<div class="empty-note">Awaiting ESPN roster data. Check back closer to game time.</div>`; return; }

  let html = `<div class="data-badge">PRE-GAME STATS</div><div>`;
  targets.slice(0,8).forEach(p => {
    const pts = parseFloat(p.stats[0]||0), ast = parseFloat(p.stats[1]||0), reb = parseFloat(p.stats[2]||0), thr = parseFloat(p.stats[3]||0);
    const conf = Math.min(92, Math.max(15, 50 + (pts>=20?20:pts>=14?10:pts<7?-20:0) + (reb>=7?8:0) + (ast>=6?8:0)));
    const v = conf>=68?'take':conf>=44?'risky':'avoid', lbl = v==='take'?'TAKE':v==='risky'?'RISKY':'AVOID';

    html += `
      <div class="verdict-card ${v}" onclick="this.classList.toggle('open')">
        <div class="verdict-top">
          <div class="v-left"><div class="v-icon">${v==='take'?'✓':v==='risky'?'~':'✕'}</div><div class="v-player"><div class="v-name">${p.athlete?.shortName||'?'}</div><div class="v-sub">${p.team?.abbreviation||''}</div></div></div>
          <div class="v-right"><div class="v-verdict">${lbl}</div><div class="v-conf">${conf}%</div></div>
        </div>
        <div class="verdict-detail">
          <div class="prop-rows">${pRow('Points',pts,'pts')}${pRow('Rebounds',reb,'reb')}${pRow('Assists',ast,'ast')}</div>
          <button class="add-prop-btn" onclick="event.stopPropagation();showPropSheet('${esc(p.athlete?.displayName||'')}','${esc(p.team?.shortDisplayName||'')}','${p.athlete?.id||''}')">+ Add to Parlay Builder</button>
        </div>
      </div>`;
  });
  el.innerHTML = html + `</div>`;
}

function pRow(label, val, stat) {
  const v = parseFloat(val||0), tag = stat==='pts'&&v>=20?'tag-take':stat==='pts'&&v<8?'tag-avoid':'tag-na', tl = stat==='pts'&&v>=20?'HIGH':stat==='pts'&&v<8?'LOW':'—';
  return `<div class="prop-row"><div class="prop-lbl">${label}</div><div class="prop-vals"><div class="prop-num">${v.toFixed(1)}<span>current</span></div><div class="prop-tag ${tag}">${tl}</div></div></div>`;
}

async function loadNBAStats(id, espnData) {
  if (CFG.PROXY.includes('YOUR-RAILWAY')) return;
  const boxTeams = espnData.boxscore?.teams || [];
  if (boxTeams.length < 2) return;

  const comps = espnData.header?.competitions?.[0]?.competitors || [], home = comps.find(c=>c.homeAway==='home')||{};
  const results = [];

  for (const team of boxTeams) {
    const isHome = team.team?.id === home.team?.id;
    const athletes = team.athletes || [];
    
    // FIX: Bypass the starter lock
    let targets = athletes.filter(a => a.starter);
    if (targets.length === 0) targets = athletes.slice(0, 5);
    targets = targets.slice(0, 5);

    for (const ath of targets) {
      const name = ath.athlete?.displayName||'';
      if (!name) continue;
      try {
        const sr = await proxyFetch(`/api/player-search?name=${encodeURIComponent(name)}`);
        const np = sr?.players?.[0];
        if (!np) continue;
        const splits = await proxyFetch(`/api/player/${np.PERSON_ID}/splits`);
        if (!splits) continue;
        const l5 = splits.last5?.[0]||{}, homeStats = splits.homeAway?.find(r=>r.GROUP_VALUE==='Home')||{}, awayStats = splits.homeAway?.find(r=>r.GROUP_VALUE==='Road')||{};
        results.push({
          name, team: team.team?.abbreviation||'', playerId: np.PERSON_ID, isHome,
          seasonAvg: {PTS:np.PTS, REB:np.REB, AST:np.AST}, last5Avg: {PTS:l5.PTS, REB:l5.REB, AST:l5.AST},
          homeAvg: {PTS:homeStats.PTS, REB:homeStats.REB}, awayAvg: {PTS:awayStats.PTS, REB:awayStats.REB}
        });
      } catch(e) {}
    }
  }
  if (results.length > 0) { S.playerCache[id] = {players: results}; renderFullProj(id, espnData, S.playerCache[id]); }
}

function renderFullProj(id, espnData, nbaStats) {
  const el = document.getElementById(`pane-proj-${id}`);
  if (!nbaStats.players.length) { renderProjections(id, espnData); return; }

  let html = `<div class="data-badge">NBA STATS · Proxy Active</div><div>`;
  nbaStats.players.forEach(p => {
    const avg = p.seasonAvg||{}, l5 = p.last5Avg||{}, pts = parseFloat(avg.PTS||0), l5p = parseFloat(l5.PTS||pts);
    const conf = Math.min(92, Math.max(20, 55 + (l5p >= pts ? 15 : -15)));
    const v = conf>=68?'take':conf>=44?'risky':'avoid', lbl = v==='take'?'TAKE':v==='risky'?'RISKY':'AVOID';

    html += `
      <div class="verdict-card ${v}" onclick="this.classList.toggle('open')">
        <div class="verdict-top">
          <div class="v-left"><div class="v-icon">${v==='take'?'✓':'~'}</div><div class="v-player"><div class="v-name">${p.name}</div><div class="v-sub">${p.team}</div></div></div>
          <div class="v-right"><div class="v-verdict">${lbl}</div><div class="v-conf">${conf}%</div></div>
        </div>
        <div class="verdict-detail">
          <div class="why-block"><div class="why-title">Data Breakdown</div><div class="why-item neu"><div class="why-dot"></div><span>Season Avg: ${pts.toFixed(1)} pts</span></div></div>
          <button class="add-prop-btn" onclick="event.stopPropagation();showPropSheet('${esc(p.name)}','${esc(p.team)}','${p.playerId}')">+ Add to Parlay Builder</button>
        </div>
      </div>`;
  });
  el.innerHTML = html + `</div>`;
}

function renderVenue(id, data) { document.getElementById(`pane-venue-${id}`).innerHTML = `<div class="empty-note">Venue data requires advanced proxy deployment.</div>`; }
function renderIntel(id, data) { document.getElementById(`pane-intel-${id}`).innerHTML = `<div class="empty-note">Pre-game intel updates closer to tip-off.</div>`; }

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PARLAY BUILDER UI
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const PROPS = [{label:'Over 15.5 Points',stat:'PTS',line:15.5}, {label:'Over 20.5 Points',stat:'PTS',line:20.5}];
function showPropSheet(playerName, teamName, athleteId) {
  const inner = document.getElementById('propSheetInner');
  let html = `<div class="modal-handle"></div><div class="sheet-name">${playerName}</div><div class="sheet-sub">${teamName} · PICK A PROP LINE</div><div>`;
  PROPS.forEach(p => { html += `<div class="prop-option" onclick="addLeg('${esc(playerName)}','${esc(teamName)}','${athleteId}','${p.label}','${p.stat}',${p.line})"><div class="po-label">${p.label}</div></div>`; });
  inner.innerHTML = html + `</div><button class="cancel-sheet" onclick="document.getElementById('propSheet').classList.remove('open')">Cancel</button>`;
  document.getElementById('propSheet').classList.add('open');
}
function addLeg(playerName, teamName, athleteId, propLabel, stat, line) {
  document.getElementById('propSheet').classList.remove('open');
  if (!S.parlayLegs.some(l=>l.athleteId===athleteId&&l.stat===stat)) { S.parlayLegs.push({playerName, teamName, athleteId, propLabel, stat, line}); updateFloat(); }
}
function updateFloat() { document.getElementById('parlayBadge').textContent = S.parlayLegs.length; document.getElementById('parlayFloat').classList.toggle('show', S.parlayLegs.length>0); }
function openParlay() { renderParlay(); document.getElementById('parlayOverlay').classList.add('open'); }
function overlayClick(e, id) { if (e.target === e.currentTarget) document.getElementById(id).classList.remove('open'); }
function renderParlay() {
  const legsEl = document.getElementById('parlayLegs');
  legsEl.innerHTML = S.parlayLegs.map((leg,i) => `<div class="parlay-leg"><div class="leg-info"><div class="leg-player">${leg.playerName}</div><div class="leg-prop">${leg.teamName} · ${leg.propLabel}</div></div><button class="remove-leg" onclick="removeLeg(${i})">X</button></div>`).join('');
}
function removeLeg(i) { S.parlayLegs.splice(i,1); updateFloat(); renderParlay(); }
function startAutoRefresh() { if (S.refreshInterval) clearInterval(S.refreshInterval); S.refreshInterval = setInterval(() => loadGames(), CFG.REFRESH_SEC * 1000); }
function manualRefresh() { document.getElementById('refreshBtn').classList.add('spinning'); loadGames().then(() => document.getElementById('refreshBtn').classList.remove('spinning')); }
function esc(str) { return (str||'').replace(/'/g,"\\'").replace(/"/g,'\\"'); }

loadGames(); startAutoRefresh();
</script>
