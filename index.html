<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="COURT">
<meta name="theme-color" content="#0a0a0a">
<title>COURT — NBA Intel</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--surface:#141414;--surface2:#1e1e1e;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --take:#00d68f;--take-bg:rgba(0,214,143,0.08);--take-border:rgba(0,214,143,0.18);
  --avoid:#ff4060;--avoid-bg:rgba(255,64,96,0.08);--avoid-border:rgba(255,64,96,0.18);
  --risky:#ffaa00;--risky-bg:rgba(255,170,0,0.08);--risky-border:rgba(255,170,0,0.18);
  --accent:#6c63ff;--accent2:#4f46e5;--live:#ff4060;
  --text:#f0f0f0;--text2:#888;--text3:#444;
  --display:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;--body:'Inter',sans-serif;
  --r:12px;--r-sm:8px;--r-lg:18px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100dvh;font-size:14px;line-height:1.5;overflow-x:hidden}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 16px;padding-top:env(safe-area-inset-top);height:calc(52px + env(safe-area-inset-top));display:flex;align-items:flex-end;padding-bottom:10px;justify-content:space-between}
.logo{font-family:var(--display);font-size:20px;font-weight:800;letter-spacing:.15em;display:flex;align-items:center;gap:7px}
.logo-pulse{width:7px;height:7px;border-radius:50%;background:var(--take);box-shadow:0 0 8px var(--take);animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 8px var(--take)}50%{opacity:.4;box-shadow:none}}
.refresh-btn{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border2);border-radius:50px;padding:6px 12px;font-family:var(--body);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .2s}
.refresh-btn:hover{color:var(--text)}
.refresh-btn svg{width:12px;height:12px}
.refresh-btn.spinning svg{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* MAIN */
main{max-width:600px;margin:0 auto;padding:16px 12px 100px}
.page-title{margin-bottom:20px}
.page-title h1{font-family:var(--display);font-size:26px;font-weight:800;letter-spacing:.04em;line-height:1;margin-bottom:4px}
.page-meta{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.meta-dot{color:var(--text3)}

/* DATE GROUP */
.date-group-label{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);padding:14px 0 8px;display:flex;align-items:center;gap:10px}
.date-group-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* GAME CARD */
.game-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:8px;overflow:hidden;transition:border-color .2s;cursor:pointer}
.game-card:hover{border-color:var(--border2)}
.game-card.active{border-color:var(--accent);box-shadow:0 0 0 1px rgba(108,99,255,.15)}
.card-top{padding:14px 14px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-teams{flex:1;min-width:0}
.team-row{display:flex;align-items:center;gap:8px;padding:3px 0}
.team-logo-wrap{width:28px;height:28px;flex-shrink:0}
.team-logo-wrap img{width:28px;height:28px;border-radius:50%;object-fit:contain;background:var(--bg3);padding:2px}
.team-logo-fb{width:28px;height:28px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:8px;color:var(--text3)}
.team-name-col{flex:1;min-width:0}
.team-name{font-family:var(--display);font-size:15px;font-weight:700;letter-spacing:.04em;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.team-record{font-size:10px;color:var(--text3);margin-top:1px;font-family:var(--mono)}
.vs-divider{display:flex;align-items:center;gap:8px;padding:2px 0 2px 36px}
.vs-divider::before{content:'';width:12px;height:1px;background:var(--border)}
.at-label{font-family:var(--mono);font-size:9px;color:var(--text3)}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.countdown-timer{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--text);letter-spacing:.04em;line-height:1}
.countdown-label{font-size:8px;color:var(--text3);font-family:var(--mono);margin-top:1px;text-align:right}
.ist-time{font-size:10px;color:var(--text2);font-family:var(--mono);text-align:right}
.score-display{font-family:var(--display);font-size:18px;font-weight:700;letter-spacing:.04em;line-height:1}
.status-pill{font-family:var(--mono);font-size:9px;font-weight:500;padding:3px 8px;border-radius:50px;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
.pill-pre{background:rgba(108,99,255,.1);color:var(--accent)}
.pill-live{background:var(--avoid-bg);color:var(--live);animation:blink 1.5s infinite}
.pill-final{background:var(--bg3);color:var(--text3)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}

/* PANEL */
.game-panel{display:none;border-top:1px solid var(--border);background:var(--bg2)}
.game-card.active .game-panel{display:block}
.tabs{display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);padding:0 14px}
.tabs::-webkit-scrollbar{display:none}
.tab{font-size:12px;font-weight:500;color:var(--text3);padding:10px 11px;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;flex-shrink:0}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.pane{display:none;padding:14px}
.pane.active{display:block}

/* INJURIES / LINEUPS */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.col-head{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);padding-bottom:8px;margin-bottom:6px;border-bottom:1px solid var(--border)}
.p-row{display:flex;align-items:center;justify-content:space-between;padding:8px 9px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface);gap:6px;margin-bottom:4px}
.p-row.starter{border-left:2px solid var(--accent)}
.p-left{display:flex;align-items:center;gap:6px;min-width:0;flex:1}
.p-pos{font-family:var(--mono);font-size:8px;color:var(--text3);background:var(--bg3);padding:2px 4px;border-radius:3px;flex-shrink:0}
.p-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-tag{font-family:var(--mono);font-size:8px;font-weight:600;padding:2px 6px;border-radius:3px;text-transform:uppercase;flex-shrink:0}
.s-out{background:var(--avoid-bg);color:var(--avoid);border:1px solid var(--avoid-border)}
.s-q{background:var(--risky-bg);color:var(--risky);border:1px solid var(--risky-border)}
.s-p{background:var(--take-bg);color:var(--take);border:1px solid var(--take-border)}
.s-gtd{background:var(--risky-bg);color:var(--risky);border:1px solid var(--risky-border)}
.s-ok{background:rgba(108,99,255,.08);color:var(--accent);border:1px solid rgba(108,99,255,.15)}
.add-btn{width:24px;height:24px;border-radius:50%;border:1px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all .15s;flex-shrink:0}
.add-btn:hover{background:var(--accent2);border-color:var(--accent2);color:#fff}

/* PROJECTIONS */
.data-badge{font-family:var(--mono);font-size:9px;color:var(--text3);background:var(--bg3);padding:3px 8px;border-radius:4px;display:inline-block;margin-bottom:12px;letter-spacing:.08em}
.verdict-card{border-radius:var(--r);border:1px solid var(--border);overflow:hidden;margin-bottom:8px}
.verdict-card.take{border-color:var(--take-border);background:var(--take-bg)}
.verdict-card.avoid{border-color:var(--avoid-border);background:var(--avoid-bg)}
.verdict-card.risky{border-color:var(--risky-border);background:var(--risky-bg)}
.verdict-top{display:flex;align-items:center;justify-content:space-between;padding:11px 12px;cursor:pointer;gap:8px}
.v-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.v-icon{font-size:16px;flex-shrink:0}
.v-player{min-width:0}
.v-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.v-sub{font-family:var(--mono);font-size:9px;color:var(--text2)}
.v-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.v-verdict{font-family:var(--display);font-size:13px;font-weight:700;letter-spacing:.08em}
.take .v-verdict{color:var(--take)}.avoid .v-verdict{color:var(--avoid)}.risky .v-verdict{color:var(--risky)}
.v-conf{font-family:var(--mono);font-size:10px;color:var(--text2)}
.chevron{color:var(--text3);transition:transform .2s;flex-shrink:0}
.verdict-card.open .chevron{transform:rotate(180deg)}
.verdict-detail{display:none;padding:0 12px 12px;border-top:1px solid rgba(255,255,255,.05)}
.verdict-card.open .verdict-detail{display:block}
.prop-rows{display:flex;flex-direction:column;gap:5px;margin:10px 0}
.prop-row{display:flex;align-items:center;justify-content:space-between;padding:7px 9px;background:rgba(0,0,0,.2);border-radius:var(--r-sm);gap:6px}
.prop-lbl{font-size:11px;color:var(--text2);flex:1}
.prop-vals{display:flex;align-items:center;gap:8px}
.prop-num{font-family:var(--mono);font-size:11px;color:var(--text2);text-align:right}
.prop-num span{display:block;font-size:8px;color:var(--text3)}
.prop-tag{font-family:var(--mono);font-size:8px;font-weight:600;padding:2px 6px;border-radius:3px;text-transform:uppercase;min-width:44px;text-align:center}
.tag-take{background:var(--take-bg);color:var(--take);border:1px solid var(--take-border)}
.tag-avoid{background:var(--avoid-bg);color:var(--avoid);border:1px solid var(--avoid-border)}
.tag-risky{background:var(--risky-bg);color:var(--risky);border:1px solid var(--risky-border)}
.tag-na{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.why-block{background:rgba(0,0,0,.2);border-radius:var(--r-sm);padding:10px;margin-top:8px}
.why-title{font-family:var(--mono);font-size:8px;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;margin-bottom:6px}
.why-item{display:flex;align-items:flex-start;gap:6px;font-size:11px;color:var(--text2);line-height:1.5;padding:2px 0}
.why-dot{width:4px;height:4px;border-radius:50%;background:var(--text3);margin-top:5px;flex-shrink:0}
.why-item.pos .why-dot{background:var(--take)}.why-item.neg .why-dot{background:var(--avoid)}.why-item.neu .why-dot{background:var(--risky)}
.add-prop-btn{width:100%;margin-top:8px;padding:8px;background:none;border:1px solid var(--border2);border-radius:var(--r-sm);font-family:var(--body);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s}
.add-prop-btn:hover{border-color:var(--accent);color:var(--accent)}

/* INTEL */
.intel-list{display:flex;flex-direction:column;gap:10px}
.intel-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px}
.intel-block-title{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.log-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);gap:6px;font-size:11px}
.log-row:last-child{border-bottom:none}
.log-date{font-family:var(--mono);font-size:9px;color:var(--text3);flex-shrink:0}
.log-matchup{color:var(--text2);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-result{font-family:var(--mono);font-size:10px;font-weight:600;flex-shrink:0}
.log-result.win{color:var(--take)}.log-result.loss{color:var(--avoid)}
.log-score{font-family:var(--mono);font-size:10px;color:var(--text2);flex-shrink:0}

/* PARLAY FLOAT */
.parlay-float{position:fixed;bottom:calc(16px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(100px);z-index:200;background:var(--text);border-radius:50px;padding:11px 18px;display:flex;align-items:center;gap:10px;cursor:pointer;box-shadow:0 8px 32px rgba(0,0,0,.5);transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:calc(100vw - 24px)}
.parlay-float.show{transform:translateX(-50%) translateY(0)}
.parlay-badge{background:var(--avoid);color:#fff;font-family:var(--mono);font-size:11px;font-weight:600;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.parlay-float-text{color:var(--bg);font-weight:600;font-size:13px;flex:1}
.parlay-float-cta{background:var(--bg);color:var(--text);padding:4px 10px;border-radius:50px;font-size:11px;font-weight:600;flex-shrink:0}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:300;display:none;align-items:flex-end}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:600px;margin:0 auto;max-height:88vh;overflow-y:auto;padding:18px 14px calc(32px + env(safe-area-inset-bottom));animation:slideUp .28s cubic-bezier(.34,1.2,.64,1)}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:32px;height:3px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-family:var(--display);font-size:24px;font-weight:800;letter-spacing:.04em;margin-bottom:3px}
.modal-sub{font-size:11px;color:var(--text3);margin-bottom:18px;font-style:italic}
.parlay-leg{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg2);border-radius:var(--r);border:1px solid var(--border);margin-bottom:6px;gap:8px}
.leg-info{flex:1;min-width:0}
.leg-player{font-weight:600;font-size:13px}
.leg-prop{font-family:var(--mono);font-size:10px;color:var(--text2)}
.leg-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.remove-leg{background:none;border:none;cursor:pointer;color:var(--text3);padding:3px;transition:color .15s;display:flex}
.remove-leg:hover{color:var(--avoid)}
.parlay-analysis{background:var(--bg2);border-radius:var(--r);padding:14px;margin-top:14px}
.a-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border)}
.a-row:last-child{border-bottom:none}
.a-label{color:var(--text2)}
.a-verdict{margin-top:12px;padding:12px;border-radius:var(--r-sm);font-size:13px;font-weight:500;line-height:1.5}
.av-good{background:var(--take-bg);color:var(--take);border:1px solid var(--take-border)}
.av-warn{background:var(--risky-bg);color:var(--risky);border:1px solid var(--risky-border)}
.av-bad{background:var(--avoid-bg);color:var(--avoid);border:1px solid var(--avoid-border)}
.disclaimer{font-size:10px;color:var(--text3);text-align:center;margin-top:14px;font-style:italic}

/* PROP SHEET */
.prop-sheet{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(10px);z-index:400;display:none;align-items:flex-end}
.prop-sheet.open{display:flex}
.prop-sheet-inner{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:600px;margin:0 auto;padding:18px 14px calc(32px + env(safe-area-inset-bottom));max-height:78vh;overflow-y:auto;animation:slideUp .25s cubic-bezier(.34,1.2,.64,1)}
.sheet-name{font-family:var(--display);font-size:20px;font-weight:700;letter-spacing:.04em;margin-bottom:3px}
.sheet-sub{font-size:11px;color:var(--text3);margin-bottom:16px;font-family:var(--mono)}
.prop-option{display:flex;align-items:center;justify-content:space-between;padding:11px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:border-color .15s;gap:8px;margin-bottom:5px}
.prop-option:hover{border-color:var(--accent)}
.po-label{font-size:13px;font-weight:500}
.po-v{display:flex;align-items:center;gap:4px;flex-shrink:0}
.cancel-sheet{margin-top:8px;width:100%;padding:11px;background:none;border:1px solid var(--border2);border-radius:var(--r);font-family:var(--body);font-size:13px;color:var(--text3);cursor:pointer}

/* LOADING */
.loading-block{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 16px;gap:12px}
.spinner{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.load-txt{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.1em}
.empty-note{font-size:12px;color:var(--text3);text-align:center;padding:18px;font-style:italic;line-height:1.6}
.error-bar{background:var(--avoid-bg);border:1px solid var(--avoid-border);border-radius:var(--r);padding:10px 14px;color:var(--avoid);font-size:12px;margin-bottom:14px;display:none}

@media(max-width:380px){.two-col{grid-template-columns:1fr}.modal-title{font-size:20px}}
.fade{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-pulse"></div>COURT</div>
  <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    Refresh
  </button>
</header>

<main>
  <div class="page-title">
    <h1>NBA INTEL</h1>
    <div class="page-meta">
      <span id="gamesCount">Loading...</span>
      <span class="meta-dot">·</span>
      <span id="updatedAt"></span>
      <span class="meta-dot">·</span>
      <span style="font-family:var(--mono);font-size:10px;color:var(--text3)">All times IST</span>
    </div>
  </div>
  <div class="error-bar" id="errorBar">⚠ Live data unavailable. Tap Refresh to retry.</div>
  <div id="gamesList">
    <div class="loading-block"><div class="spinner"></div><div class="load-txt">FETCHING GAMES...</div></div>
  </div>
</main>

<div class="parlay-float" id="parlayFloat" onclick="openParlay()">
  <div class="parlay-badge" id="parlayBadge">0</div>
  <div class="parlay-float-text">Parlay Builder</div>
  <div class="parlay-float-cta">Analyze →</div>
</div>

<div class="overlay" id="parlayOverlay" onclick="oClick(event,'parlayOverlay')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">PARLAY BUILDER</div>
    <div class="modal-sub">Statistical estimates only. Not financial advice.</div>
    <div id="parlayLegs"></div>
    <div id="parlayAnalysis"></div>
    <div class="disclaimer">Data-driven estimates. Never bet money you cannot afford to lose.</div>
  </div>
</div>

<div class="prop-sheet" id="propSheet" onclick="oClick(event,'propSheet')">
  <div class="prop-sheet-inner" id="propSheetInner"></div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CONFIG — paste your BallDontLie API key below
// Get it free at: app.balldontlie.io
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const S = {

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// IST HELPERS — using Intl where possible, safe fallback
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function toIST(date) {
  // Safe: manually offset UTC to IST (UTC+5:30), no DST in India
  const utcMs = date.getTime() + date.getTimezoneOffset() * 60000;
  return new Date(utcMs + 19800000); // 5.5 * 3600 * 1000
}

function istTimeStr(date) {
  try {
    return date.toLocaleTimeString('en-IN', {
      timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit', hour12: true
    }).toUpperCase();
  } catch(e) {
    const ist = toIST(date);
    let h = ist.getUTCHours();
    const m = String(ist.getUTCMinutes()).padStart(2,'0');
    const ap = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return `${h}:${m} ${ap}`;
  }
}

function istDateKey(date) {
  try {
    const f = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Kolkata' });
    return f.format(date);
  } catch(e) {
    const ist = toIST(date);
    return `${ist.getUTCFullYear()}-${ist.getUTCMonth()}-${ist.getUTCDate()}`;
  }
}

function espnDateStr(date) {
  try {
    const f = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Kolkata' });
    return f.format(date).replace(/-/g,'');
  } catch(e) {
    const ist = toIST(date);
    return `${ist.getUTCFullYear()}${String(ist.getUTCMonth()+1).padStart(2,'0')}${String(ist.getUTCDate()).padStart(2,'0')}`;
  }
}

function friendlyDate(date) {
  const ist = toIST(date);
  const nowIST = toIST(new Date());
  const tomIST = toIST(new Date(Date.now() + 86400000));
  const days = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const sameDay = (a, b) => a.getUTCDate()===b.getUTCDate() && a.getUTCMonth()===b.getUTCMonth() && a.getUTCFullYear()===b.getUTCFullYear();
  if (sameDay(ist, nowIST)) return 'TODAY';
  if (sameDay(ist, tomIST)) return 'TOMORROW';
  return `${days[ist.getUTCDay()]}, ${months[ist.getUTCMonth()]} ${ist.getUTCDate()}`;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// COUNTDOWN
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function fmtCountdown(ms) {
  if (ms <= 0) return 'STARTING NOW';
  const s  = Math.floor(ms / 1000) % 60;
  const mi = Math.floor(ms / 60000) % 60;
  const h  = Math.floor(ms / 3600000) % 24;
  const d  = Math.floor(ms / 86400000);
  const p  = n => String(n).padStart(2,'0');
  return d > 0 ? `${p(d)}:${p(h)}:${p(mi)}:${p(s)}` : `${p(h)}:${p(mi)}:${p(s)}`;
}

function startCD(id, gameDate) {
  if (S.countdowns[id]) clearInterval(S.countdowns[id]);
  const tick = () => {
    const el  = document.getElementById(`cd-${id}`);
    const lbl = document.getElementById(`cdl-${id}`);
    if (!el) { clearInterval(S.countdowns[id]); return; }
    const ms = gameDate.getTime() - Date.now();
    el.textContent  = fmtCountdown(ms);
    if (lbl) lbl.textContent = ms >= 86400000 ? 'DD:HH:MM:SS' : ms > 0 ? 'HH:MM:SS' : '';
  };
  tick();
  S.countdowns[id] = setInterval(tick, 1000);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// FETCH HELPERS — XSS-safe, no innerHTML from raw API strings
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function espnFetch(path) {
  const r = await fetch(CFG.ESPN + path);
  if (!r.ok) throw new Error(`ESPN ${r.status}`);
  return r.json();
}

// BallDontLie — works directly from browser, no proxy needed
async function bdlFetch(path) {
  if (!CFG.BDL_KEY || CFG.BDL_KEY.includes('YOUR-')) return null;
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 8000); // 8s timeout
    const r = await fetch(CFG.BDL + path, {
      headers: { Authorization: CFG.BDL_KEY },
      signal: controller.signal,
    });
    clearTimeout(timer);
    if (!r.ok) return null;
    return r.json();
  } catch(e) {
    return null;
  }
}

// Safe text — prevents XSS from API player names
function safeText(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

// Safe attr — for use inside HTML attribute strings in onclick
function esc(s) {
  return String(s || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// LOAD GAMES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function loadGames() {
  try {
    document.getElementById('errorBar').style.display = 'none';
    const allGames = [];
    const now = new Date();
    let emptyStreak = 0;

    for (let i = -1; i <= 8; i++) {
      const d = new Date(now.getTime() + i * 86400000);
      try {
        const data = await espnFetch(`/scoreboard?dates=${espnDateStr(d)}`);
        const events = (data.events || []).filter(ev => {
          const cs = ev.competitions?.[0]?.competitors || [];
          const hasTeams = cs.some(c => c.team?.abbreviation && c.team.abbreviation !== 'TBD');
          // For yesterday (i=-1), only include live or upcoming games, skip finals
          if (i === -1) {
            const sn = ev.status?.type?.name || '';
            return hasTeams && sn !== 'STATUS_FINAL';
          }
          return hasTeams;
        });
        if (!events.length) { emptyStreak++; if (emptyStreak >= 2) break; }
        else { emptyStreak = 0; events.forEach(ev => allGames.push(ev)); }
      } catch(e) { /* skip day */ }
    }

    S.games = allGames;
    document.getElementById('gamesCount').textContent =
      `${allGames.length} game${allGames.length !== 1 ? 's' : ''} upcoming`;
    document.getElementById('updatedAt').textContent = istTimeStr(new Date());
    renderGames();
  } catch(e) {
    document.getElementById('errorBar').style.display = 'block';
    document.getElementById('gamesCount').textContent = 'unavailable';
    if (!S.games.length)
      document.getElementById('gamesList').innerHTML =
        '<div class="empty-note">Could not load games. Check your connection.</div>';
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// RENDER GAMES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderGames() {
  const list = document.getElementById('gamesList');
  if (!S.games.length) {
    list.innerHTML = '<div class="empty-note">No upcoming NBA games found.</div>';
    return;
  }
  list.innerHTML = '';
  const groups = {}, order = [];
  S.games.forEach(ev => {
    const key = istDateKey(new Date(ev.date));
    if (!groups[key]) { groups[key] = { date: new Date(ev.date), events: [] }; order.push(key); }
    groups[key].events.push(ev);
  });
  order.forEach(key => {
    const g = groups[key];
    const hdr = document.createElement('div');
    hdr.className = 'date-group-label';
    hdr.textContent = friendlyDate(g.date);
    list.appendChild(hdr);
    g.events.forEach(ev => list.appendChild(makeCard(ev)));
  });
  if (S.activeGame) {
    const c = document.getElementById(`card-${S.activeGame}`);
    if (c) { c.classList.add('active'); loadPanel(S.activeGame); }
  }
  S.games.forEach(ev => {
    const sn = ev.status?.type?.name || '';
    if (sn !== 'STATUS_FINAL' && sn !== 'STATUS_IN_PROGRESS')
      startCD(ev.id, new Date(ev.date));
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MAKE CARD — uses DOM createElement to avoid XSS on team names
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function makeCard(ev) {
  const comp = ev.competitions?.[0] || {};
  const cs   = comp.competitors || [];
  const home = cs.find(c => c.homeAway === 'home') || cs[0] || {};
  const away = cs.find(c => c.homeAway === 'away') || cs[1] || {};
  const sn   = ev.status?.type?.name || '';
  const isLive  = sn === 'STATUS_IN_PROGRESS';
  const isFinal = sn === 'STATUS_FINAL';
  const gameDate = new Date(ev.date);

  function teamHTML(team) {
    const abbr = safeText(team.team?.abbreviation || '?');
    const logo = team.team?.logo || '';
    const rec  = team.records?.[0]?.summary || '';
    const w = rec.split('-')[0] || '';
    const l = rec.split('-')[1] || '';
    const logoHtml = logo
      ? `<img src="${logo}" alt="${abbr}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="team-logo-fb" style="display:none">${abbr}</div>`
      : `<div class="team-logo-fb">${abbr}</div>`;
    return `<div class="team-row">
      <div class="team-logo-wrap">${logoHtml}</div>
      <div class="team-name-col">
        <div class="team-name">${abbr}</div>
        ${rec ? `<div class="team-record">${safeText(w)}W · ${safeText(l)}L</div>` : ''}
      </div>
    </div>`;
  }

  let rightHTML = '';
  if (isLive || isFinal) {
    const pill    = isLive ? 'pill-live' : 'pill-final';
    const pillTxt = isLive ? safeText(ev.status?.type?.shortDetail || 'LIVE') : 'FINAL';
    rightHTML = `<div class="score-display">${safeText(away.score ?? '0')} – ${safeText(home.score ?? '0')}</div>
      <div class="status-pill ${pill}">${pillTxt}</div>`;
  } else {
    rightHTML = `<div class="countdown-timer" id="cd-${ev.id}">--:--:--</div>
      <div class="countdown-label" id="cdl-${ev.id}">HH:MM:SS</div>
      <div class="ist-time">${istTimeStr(gameDate)} IST</div>`;
  }

  const card = document.createElement('div');
  card.className = 'game-card fade';
  card.id = `card-${ev.id}`;
  card.innerHTML = `
    <div class="card-top" onclick="toggleCard('${ev.id}')">
      <div class="card-teams">
        ${teamHTML(away)}
        <div class="vs-divider"><span class="at-label">@ ${safeText(home.team?.abbreviation || 'HOME')}</span></div>
        ${teamHTML(home)}
      </div>
      <div class="card-right">${rightHTML}</div>
    </div>
    <div class="game-panel" id="panel-${ev.id}">
      <div class="tabs">
        <div class="tab active" onclick="swTab('${ev.id}','inj',this)">Injuries</div>
        <div class="tab" onclick="swTab('${ev.id}','lineups',this)">Lineups</div>
        <div class="tab" onclick="swTab('${ev.id}','proj',this)">Projections</div>
        <div class="tab" onclick="swTab('${ev.id}','venue',this)">Venue & H2H</div>
        <div class="tab" onclick="swTab('${ev.id}','intel',this)">Game Intel</div>
      </div>
      <div id="pane-inj-${ev.id}"     class="pane active"><div class="loading-block"><div class="spinner"></div><div class="load-txt">LOADING...</div></div></div>
      <div id="pane-lineups-${ev.id}" class="pane"></div>
      <div id="pane-proj-${ev.id}"    class="pane"></div>
      <div id="pane-venue-${ev.id}"   class="pane"></div>
      <div id="pane-intel-${ev.id}"   class="pane"></div>
    </div>`;
  return card;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// TOGGLE / TABS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function toggleCard(id) {
  const card = document.getElementById(`card-${id}`);
  const was  = card.classList.contains('active');
  document.querySelectorAll('.game-card.active').forEach(c => c.classList.remove('active'));
  S.activeGame = null;
  if (!was) {
    card.classList.add('active');
    S.activeGame = id;
    loadPanel(id);
    history.pushState({ gameOpen: id }, '');
    setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
  }
}

window.addEventListener('popstate', () => {
  if (S.activeGame) {
    const c = document.getElementById(`card-${S.activeGame}`);
    if (c) c.classList.remove('active');
    S.activeGame = null;
  }
});

function swTab(id, tab, el) {
  el.closest('.tabs').querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll(`#panel-${id} .pane`).forEach(p => p.classList.remove('active'));
  document.getElementById(`pane-${tab}-${id}`).classList.add('active');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// LOAD PANEL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function loadPanel(id) {
  const cached = S.gameCache[id];
  if (cached && Date.now() - cached.ts < 90000) { renderPanel(id, cached.data); return; }
  try {
    const data = await espnFetch(`/summary?event=${id}`);
    S.gameCache[id] = { data, ts: Date.now() };
    renderPanel(id, data);
    loadBDLStats(id, data); // fire & forget — fills in projections when ready
  } catch(e) {
    document.getElementById(`pane-inj-${id}`).innerHTML =
      '<div class="empty-note">Could not load details.<br>Live data temporarily unavailable.</div>';
  }
}

function renderPanel(id, data) {
  rInj(id, data);
  rLineups(id, data);
  rProj(id, data);
  rVenue(id, data);
  rIntel(id, data);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// INJURIES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function rInj(id, data) {
  const el = document.getElementById(`pane-inj-${id}`);
  const comps    = data.header?.competitions?.[0]?.competitors || [];
  const injuries = data.injuries || [];
  if (injuries.length < 2) {
    el.innerHTML = '<div class="empty-note">No injury report yet.<br>Updates drop ~90 min before tip-off.</div>';
    return;
  }
  let html = '<div class="two-col">';
  injuries.forEach((ti, i) => {
    const name = safeText(comps[i]?.team?.shortDisplayName || `Team ${i+1}`);
    const list = ti.injuries || [];
    html += `<div><div class="col-head">${name}</div>`;
    if (!list.length) {
      html += '<div style="font-size:11px;color:var(--take);padding:6px 0">No injuries ✓</div>';
    } else {
      list.forEach(inj => {
        const p      = inj.athlete || {};
        const st     = inj.status || '';
        const reason = inj.longComment || inj.shortComment || '';
        html += `<div class="p-row">
          <div class="p-left">
            <span class="p-pos">${safeText(p.position?.abbreviation || '?')}</span>
            <span class="p-name">${safeText(p.shortName || p.displayName || '?')}</span>
          </div>
          <span class="s-tag ${sCls(st)}">${sFmt(st)}</span>
        </div>`;
        if (reason) html += `<div style="font-size:10px;color:var(--text3);padding:0 9px 5px;font-style:italic">${safeText(reason)}</div>`;
      });
    }
    html += '</div>';
  });
  html += '</div>';
  el.innerHTML = html;
}

function sCls(s) {
  const l = s.toLowerCase();
  if (l.includes('out'))      return 's-out';
  if (l.includes('question')) return 's-q';
  if (l.includes('probable')) return 's-p';
  if (l.includes('day') || l.includes('gtd')) return 's-gtd';
  return 's-ok';
}

function sFmt(s) {
  const m = { Active:'OK', Out:'OUT', Questionable:'QUEST.', Probable:'PROB.',
    'Day-To-Day':'GTD', Doubtful:'DOUBT.', Suspended:'SUSP.' };
  return m[s] || s.slice(0, 6).toUpperCase();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// LINEUPS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function rLineups(id, data) {
  const el = document.getElementById(`pane-lineups-${id}`);
  const teams = data.boxscore?.teams || [];
  if (teams.length < 2) {
    el.innerHTML = '<div class="empty-note">Lineups drop 30–60 min before tip-off.<br>Refresh closer to game time.</div>';
    return;
  }
  let html = '<div class="two-col">';
  teams.forEach(team => {
    const name     = safeText(team.team?.shortDisplayName || 'Team');
    const aths     = team.athletes || [];
    const starters = aths.filter(a => a.starter);
    const bench    = aths.filter(a => !a.starter).slice(0, 8);
    html += `<div><div class="col-head">${name}</div>`;
    if (starters.length) {
      html += '<div style="font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:.1em;margin-bottom:4px;text-transform:uppercase">Starters</div>';
      starters.forEach(a => {
        const ath = a.athlete || {};
        html += `<div class="p-row starter">
          <div class="p-left">
            <span class="p-pos">${safeText(ath.position?.abbreviation || '?')}</span>
            <span class="p-name">${safeText(ath.shortName || ath.displayName || '?')}</span>
          </div>
          <button class="add-btn" onclick="showSheet('${esc(ath.displayName||'')}','${esc(team.team?.shortDisplayName||'')}','${esc(ath.id||'')}')">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>`;
      });
    }
    if (bench.length) {
      html += '<div style="font-family:var(--mono);font-size:8px;color:var(--text3);letter-spacing:.1em;margin:8px 0 4px;text-transform:uppercase">Bench</div>';
      bench.forEach(a => {
        const ath = a.athlete || {};
        html += `<div class="p-row">
          <div class="p-left">
            <span class="p-pos">${safeText(ath.position?.abbreviation || '?')}</span>
            <span class="p-name">${safeText(ath.shortName || ath.displayName || '?')}</span>
          </div>
          <button class="add-btn" onclick="showSheet('${esc(ath.displayName||'')}','${esc(team.team?.shortDisplayName||'')}','${esc(ath.id||'')}')">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>`;
      });
    }
    if (!aths.length) html += '<div class="empty-note" style="text-align:left;padding:6px 0">Not confirmed yet.</div>';
    html += '</div>';
  });
  html += '</div>';
  el.innerHTML = html;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PROJECTIONS — shows placeholder until BDL data arrives
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function rProj(id, data) {
  const el = document.getElementById(`pane-proj-${id}`);

  // If we already have BDL data for this game, use it immediately
  if (S.playerCache[id]) { rFullProj(id, S.playerCache[id]); return; }

  const hasBDL = CFG.BDL_KEY && !CFG.BDL_KEY.includes('YOUR-');

  // Try to show live boxscore stats if game is in progress
  const teams   = data.boxscore?.teams || [];
  const players = [];
  teams.forEach(t => (t.athletes||[]).forEach(a => {
    if ((a.stats||[]).length) players.push({ athlete: a.athlete, team: t.team, stats: a.stats, starter: a.starter });
  }));
  const starters = players.filter(p => p.starter);

  if (starters.length) {
    // Game is live — show live stats
    let html = '<div class="data-badge">LIVE STATS</div><div>';
    starters.slice(0, 8).forEach(p => {
      const pts = parseFloat(p.stats[0] || 0);
      const ast = parseFloat(p.stats[1] || 0);
      const reb = parseFloat(p.stats[2] || 0);
      const thr = parseFloat(p.stats[3] || 0);
      const conf = Math.min(92, Math.max(15, 50 + (pts>=20?20:pts>=14?10:pts<7?-20:0) + (reb>=7?8:0) + (ast>=6?8:0)));
      const v    = conf>=68?'take':conf>=44?'risky':'avoid';
      html += vCard(
        safeText(p.athlete?.shortName || p.athlete?.displayName || '?'),
        safeText(`${p.team?.abbreviation||''} · ${p.athlete?.position?.abbreviation||''}`),
        v, conf,
        `<div class="prop-row"><div class="prop-lbl">Points</div><div class="prop-vals"><div class="prop-num">${pts.toFixed(1)}<span>live</span></div></div></div>
         <div class="prop-row"><div class="prop-lbl">Rebounds</div><div class="prop-vals"><div class="prop-num">${reb.toFixed(1)}<span>live</span></div></div></div>
         <div class="prop-row"><div class="prop-lbl">Assists</div><div class="prop-vals"><div class="prop-num">${ast.toFixed(1)}<span>live</span></div></div></div>`,
        (pts>=20?'<div class="why-item pos"><div class="why-dot"></div><span>Strong scoring — points props favorable</span></div>':'')+
        (pts<10?'<div class="why-item neg"><div class="why-dot"></div><span>Low output — avoid high point lines</span></div>':''),
        `showSheet('${esc(p.athlete?.displayName||'')}','${esc(p.team?.shortDisplayName||'')}','${esc(p.athlete?.id||'')}')`
      );
    });
    html += '</div>';
    el.innerHTML = html;
    return;
  }

  // Pre-game — show loading state if BDL is configured
  if (hasBDL) {
    el.innerHTML = `<div class="data-badge">LOADING STATS…</div>
      <div class="loading-block"><div class="spinner"></div><div class="load-txt">FETCHING SEASON AVERAGES</div></div>`;
  } else {
    el.innerHTML = `<div class="data-badge">SETUP REQUIRED</div>
      <div class="empty-note">
        Add your free BallDontLie API key to get:<br><br>
        <strong>Season avg · Last 5 games · TAKE / AVOID verdicts</strong><br><br>
        Get key free at <strong>app.balldontlie.io</strong><br>
        Then paste it in the CFG.BDL_KEY field in index.html
      </div>`;
  }
}

function vCard(name, sub, v, conf, propRowsHTML, whyHTML, addFn) {
  const icon = v==='take'?'✓':v==='risky'?'~':'✕';
  const lbl  = v==='take'?'TAKE':v==='risky'?'RISKY':'AVOID';
  return `<div class="verdict-card ${v}" onclick="this.classList.toggle('open')">
    <div class="verdict-top">
      <div class="v-left">
        <div class="v-icon">${icon}</div>
        <div class="v-player"><div class="v-name">${name}</div><div class="v-sub">${sub}</div></div>
      </div>
      <div class="v-right">
        <div class="v-verdict">${lbl}</div>
        <div class="v-conf">${conf}%</div>
        <svg class="chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>
    <div class="verdict-detail">
      <div class="prop-rows">${propRowsHTML}</div>
      <div class="why-block"><div class="why-title">Analysis</div>${whyHTML}</div>
      <button class="add-prop-btn" onclick="event.stopPropagation();${addFn}">+ Add to Parlay Builder</button>
    </div>
  </div>`;
}

function rFullProj(id, bdlStats) {
  const el = document.getElementById(`pane-proj-${id}`);
  const players = bdlStats.players || [];
  if (!players.length) {
    el.innerHTML = '<div class="empty-note">No player stats found for this game yet.</div>';
    return;
  }
  let html = '<div class="data-badge">BALLDONTLIE · Season avg + Last 5 + Home/Away</div><div>';
  players.forEach(p => {
    const avg = p.seasonAvg || {};
    const l5  = p.last5Avg  || {};
    const rel = p.isHome ? (p.homeAvg || avg) : (p.awayAvg || avg);

    const pts = parseFloat(rel.pts || avg.pts || 0);
    const reb = parseFloat(rel.reb || avg.reb || 0);
    const ast = parseFloat(rel.ast || avg.ast || 0);
    const thr = parseFloat(rel.fg3m || avg.fg3m || 0);
    const stl = parseFloat(avg.stl || 0);
    const blk = parseFloat(avg.blk || 0);
    const l5p = parseFloat(l5.pts || pts);
    const l5r = parseFloat(l5.reb || reb);

    const trend = l5p >= pts * 1.05 ? 2 : l5p >= pts * 0.92 ? 1 : l5p >= pts * 0.80 ? 0 : -1;
    const homeBonus = p.isHome ? 3 : -3;
    const conf = Math.min(90, Math.max(20, 55 + trend * 10 + homeBonus));
    const v    = conf >= 65 ? 'take' : conf >= 45 ? 'risky' : 'avoid';

    const propRows = `
      <div class="prop-row">
        <div class="prop-lbl">Points</div>
        <div class="prop-vals">
          <div class="prop-num">${pts.toFixed(1)}<span>${p.isHome?'home':'away'}</span></div>
          <div class="prop-num">${l5p.toFixed(1)}<span>last 5</span></div>
          <div class="prop-num">${parseFloat(avg.pts||0).toFixed(1)}<span>season</span></div>
          <div class="prop-tag ${l5p>=pts*0.9?'tag-take':'tag-avoid'}">${l5p>=pts*0.9?'GOOD':'WEAK'}</div>
        </div>
      </div>
      <div class="prop-row">
        <div class="prop-lbl">Rebounds</div>
        <div class="prop-vals">
          <div class="prop-num">${reb.toFixed(1)}<span>${p.isHome?'home':'away'}</span></div>
          <div class="prop-num">${l5r.toFixed(1)}<span>last 5</span></div>
          <div class="prop-num">${parseFloat(avg.reb||0).toFixed(1)}<span>season</span></div>
          <div class="prop-tag ${l5r>=reb*0.9?'tag-take':'tag-avoid'}">${l5r>=reb*0.9?'GOOD':'WEAK'}</div>
        </div>
      </div>
      <div class="prop-row">
        <div class="prop-lbl">Assists</div>
        <div class="prop-vals">
          <div class="prop-num">${ast.toFixed(1)}<span>avg</span></div>
          <div class="prop-num">${parseFloat(l5.ast||ast).toFixed(1)}<span>last 5</span></div>
          <div class="prop-num">${thr.toFixed(1)}<span>3PM avg</span></div>
          <div class="prop-tag tag-na">—</div>
        </div>
      </div>`;

    const trendTxt = trend>=2?'🔥 Hot — last 5 avg above season avg':
      trend>=1?'↑ Trending up slightly':
      trend>=0?'→ Consistent form':
      '↓ Cold streak — last 5 below season avg';
    const trendCls = trend>=1?'pos':trend>=0?'neu':'neg';

    const whyHTML = `
      <div class="why-item ${trendCls}"><div class="why-dot"></div><span>${trendTxt}: ${l5p.toFixed(1)} pts vs ${parseFloat(avg.pts||0).toFixed(1)} season</span></div>
      <div class="why-item ${p.isHome?'pos':'neu'}"><div class="why-dot"></div><span>${p.isHome?'Home':'Away'} avg: ${pts.toFixed(1)} pts / ${reb.toFixed(1)} reb / ${ast.toFixed(1)} ast</span></div>
      ${stl>1.3?'<div class="why-item pos"><div class="why-dot"></div><span>High steals avg ('+stl.toFixed(1)+') — active defender</span></div>':''}
      ${blk>1.5?'<div class="why-item pos"><div class="why-dot"></div><span>Strong shot blocker ('+blk.toFixed(1)+'bpg) — blocks prop worth checking</span></div>':''}
      ${thr>2.5?'<div class="why-item pos"><div class="why-dot"></div><span>Good three-point shooter ('+thr.toFixed(1)+'3PM) — threes props favorable</span></div>':''}
      ${p.injuryNote?'<div class="why-item neg"><div class="why-dot"></div><span>⚠ '+safeText(p.injuryNote)+'</span></div>':''}`;

    html += vCard(
      safeText(p.name),
      safeText(`${p.team} · ${p.isHome?'HOME':'AWAY'} · ${p.pos||''}`),
      v, conf, propRows, whyHTML,
      `showSheetData('${esc(p.name)}','${esc(p.team)}','${esc(p.espnId||'')}',${pts},${reb},${ast},${thr})`
    );
  });
  html += '</div>';
  el.innerHTML = html;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// BALLDONTLIE STATS LOADER — pre-game projections
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function loadBDLStats(gameId, espnData) {
  if (!CFG.BDL_KEY || CFG.BDL_KEY.includes('YOUR-')) return;

  const comps = espnData.header?.competitions?.[0]?.competitors || [];
  const homeComp = comps.find(c => c.homeAway === 'home') || {};

  // Get ESPN roster — both teams' key players
  const espnTeams = espnData.rosters || [];
  // Fallback: get names from injuries + boxscore
  const nameSet = new Set();
  const teamMap = {}; // name -> {team, isHome, pos, espnId, injuryNote}

  comps.forEach(comp => {
    const isHome = comp.homeAway === 'home';
    const abbr   = comp.team?.abbreviation || '';
    // Get athletes from ESPN roster if available
    (comp.roster?.entries || []).forEach(e => {
      const name = e.playerPoolEntry?.player?.fullName || '';
      if (name) { nameSet.add(name); teamMap[name] = { team: abbr, isHome, pos: e.playerPoolEntry?.player?.defaultPositionId, espnId: e.playerId }; }
    });
  });

  // Also pull names from boxscore
  (espnData.boxscore?.teams || []).forEach(t => {
    const isHome = t.team?.id === homeComp.team?.id;
    const abbr   = t.team?.abbreviation || '';
    (t.athletes || []).forEach(a => {
      const name = a.athlete?.displayName || '';
      if (name && !teamMap[name]) {
        nameSet.add(name);
        teamMap[name] = { team: abbr, isHome, pos: a.athlete?.position?.abbreviation, espnId: a.athlete?.id };
      }
    });
  });

  // Pull injury info to annotate
  const injMap = {};
  (espnData.injuries || []).forEach(ti => {
    (ti.injuries || []).forEach(inj => {
      const n = inj.athlete?.displayName || '';
      const st = inj.status || '';
      if (n && (st.toLowerCase().includes('out') || st.toLowerCase().includes('question')))
        injMap[n] = st;
    });
  });

  // If we have no names, try fetching ESPN summary rosters
  if (nameSet.size === 0) {
    // No roster data available yet (pre-lineup) — try BDL top players for teams
    const homeAbbr = homeComp.team?.abbreviation || '';
    const awayComp = comps.find(c => c.homeAway === 'away') || {};
    const awayAbbr = awayComp.team?.abbreviation || '';
    if (!homeAbbr || !awayAbbr) return;

    // Get team rosters from BDL
    try {
      const [homeTeam, awayTeam] = await Promise.all([
        bdlFetch(`/teams?search=${homeAbbr}`),
        bdlFetch(`/teams?search=${awayAbbr}`),
      ]);
      const hId = homeTeam?.data?.[0]?.id;
      const aId = awayTeam?.data?.[0]?.id;
      if (!hId || !aId) return;

      const [hPlayers, aPlayers] = await Promise.all([
        bdlFetch(`/players/active?team_ids[]=${hId}&per_page=13`),
        bdlFetch(`/players/active?team_ids[]=${aId}&per_page=13`),
      ]);
      (hPlayers?.data || []).forEach(p => {
        const name = `${p.first_name} ${p.last_name}`;
        nameSet.add(name);
        teamMap[name] = { team: homeAbbr, isHome: true, pos: p.position, bdlId: p.id };
      });
      (aPlayers?.data || []).forEach(p => {
        const name = `${p.first_name} ${p.last_name}`;
        nameSet.add(name);
        teamMap[name] = { team: awayAbbr, isHome: false, pos: p.position, bdlId: p.id };
      });
    } catch(e) { return; }
  }

  if (nameSet.size === 0) return;

  // Fetch season averages for all players in one call (BDL supports multiple player_ids)
  // First get BDL player IDs for all names
  const results = [];
  const names = [...nameSet].slice(0, 20); // cap at 20 players

  for (const name of names) {
    try {
      const meta = teamMap[name] || {};
      let bdlId = meta.bdlId;

      if (!bdlId) {
        const search = await bdlFetch(`/players?search=${encodeURIComponent(name)}&per_page=5`);
        const match = (search?.data || []).find(p => {
          const full = `${p.first_name} ${p.last_name}`.toLowerCase();
          return full === name.toLowerCase() || full.includes(name.split(' ').pop()?.toLowerCase());
        });
        if (!match) continue;
        bdlId = match.id;
      }

      // Get season averages
      const [seasonRes, last5Res] = await Promise.all([
        bdlFetch(`/season_averages?season=2024&player_ids[]=${bdlId}`),
        bdlFetch(`/stats?seasons[]=2024&player_ids[]=${bdlId}&per_page=5&postseason=false`),
      ]);

      const seasonAvg = seasonRes?.data?.[0] || {};
      if (!seasonAvg.pts && !seasonAvg.reb) continue; // skip players with no data

      // Compute last 5 averages from recent games
      const last5Games = (last5Res?.data || []).slice(0, 5);
      const l5avg = last5Games.length ? {
        pts:  avg5(last5Games, 'pts'),
        reb:  avg5(last5Games, 'reb'),
        ast:  avg5(last5Games, 'ast'),
        fg3m: avg5(last5Games, 'fg3m'),
        stl:  avg5(last5Games, 'stl'),
        blk:  avg5(last5Games, 'blk'),
      } : seasonAvg;

      results.push({
        name,
        team:      meta.team || '',
        isHome:    meta.isHome || false,
        pos:       meta.pos || seasonAvg.player?.position || '',
        espnId:    meta.espnId || '',
        injuryNote: injMap[name] || '',
        seasonAvg: {
          pts: seasonAvg.pts, reb: seasonAvg.reb, ast: seasonAvg.ast,
          fg3m: seasonAvg.fg3m, stl: seasonAvg.stl, blk: seasonAvg.blk,
        },
        last5Avg: l5avg,
        // home/away split approximation — BDL free tier doesn't have splits
        // so we apply a statistical adjustment (+5% home, -5% away)
        homeAvg: {
          pts: (seasonAvg.pts||0) * 1.05, reb: (seasonAvg.reb||0) * 1.04,
          ast: (seasonAvg.ast||0) * 1.03, fg3m: (seasonAvg.fg3m||0) * 1.02,
        },
        awayAvg: {
          pts: (seasonAvg.pts||0) * 0.95, reb: (seasonAvg.reb||0) * 0.96,
          ast: (seasonAvg.ast||0) * 0.97, fg3m: (seasonAvg.fg3m||0) * 0.98,
        },
      });
    } catch(e) { /* skip player */ }
  }

  if (results.length) {
    S.playerCache[gameId] = { players: results };
    rFullProj(gameId, S.playerCache[gameId]);
  } else {
    // Nothing loaded — show honest message instead of endless spinner
    const el = document.getElementById(`pane-proj-${gameId}`);
    if (el && el.querySelector('.load-txt')) {
      el.innerHTML = `<div class="data-badge">BDL · 2024-25 SEASON</div>
        <div class="empty-note">
          Could not load player stats for this game.<br><br>
          This can happen when:<br>
          • Rosters not yet confirmed (check closer to tip-off)<br>
          • API rate limit hit — wait 1 min and refresh<br>
          • Key issue — verify at app.balldontlie.io
        </div>`;
    }
  }
}

function avg5(games, key) {
  const vals = games.map(g => parseFloat(g[key] || 0)).filter(v => !isNaN(v));
  return vals.length ? vals.reduce((a,b)=>a+b,0) / vals.length : 0;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// VENUE & H2H
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function rVenue(id, data) {
  const el    = document.getElementById(`pane-venue-${id}`);
  const venue = data.gameInfo?.venue;
  const comps = data.header?.competitions?.[0]?.competitors || [];
  const home  = comps.find(c => c.homeAway === 'home') || {};
  const away  = comps.find(c => c.homeAway === 'away') || {};

  // Records come from scoreboard (S.games), not summary endpoint
  const scoreGame = S.games.find(g => g.id === id) || {};
  const scoreComps = scoreGame.competitions?.[0]?.competitors || [];
  const scoreHome = scoreComps.find(c => c.homeAway === 'home') || home;
  const scoreAway = scoreComps.find(c => c.homeAway === 'away') || away;

  const homeRec     = safeText(scoreHome.records?.[0]?.summary || home.records?.[0]?.summary || '?');
  const awayRec     = safeText(scoreAway.records?.[0]?.summary || away.records?.[0]?.summary || '?');
  const homeHomeRec = scoreHome.records?.[1]?.summary || home.records?.[1]?.summary || '';
  const awayAwayRec = scoreAway.records?.[1]?.summary || away.records?.[1]?.summary || '';

  let html = '<div class="intel-list">';

  if (venue) {
    html += `<div class="intel-block">
      <div class="intel-block-title">📍 Venue</div>
      <div style="font-size:14px;font-weight:600;margin-bottom:3px">${safeText(venue.fullName || 'Unknown')}</div>
      <div style="font-size:11px;color:var(--text2)">${safeText(venue.address?.city || '')}${venue.address?.state ? ', ' + safeText(venue.address.state) : ''}</div>
    </div>`;
  }

  html += `<div class="intel-block">
    <div class="intel-block-title">📊 Season Records</div>
    <div class="log-row">
      <div class="log-matchup">${safeText(away.team?.displayName || 'Away')} <span style="color:var(--text3);font-size:9px">(AWAY)</span></div>
      <div class="log-result">${awayRec}</div>
    </div>
    <div class="log-row">
      <div class="log-matchup">${safeText(home.team?.displayName || 'Home')} <span style="color:var(--text3);font-size:9px">(HOME)</span></div>
      <div class="log-result">${homeRec}</div>
    </div>
    ${homeHomeRec ? `<div class="log-row"><div class="log-matchup" style="color:var(--text3)">Home record</div><div class="log-result">${safeText(homeHomeRec)}</div></div>` : ''}
    ${awayAwayRec ? `<div class="log-row"><div class="log-matchup" style="color:var(--text3)">Away record</div><div class="log-result">${safeText(awayAwayRec)}</div></div>` : ''}
  </div>

  <div class="intel-block" id="vblock-${id}">
    <div class="intel-block-title">🏟 Last 5 at This Venue</div>
    <div class="empty-note" style="text-align:left;font-size:11px;padding:4px 0">Venue history loads via BDL stats.</div>
  </div>

  <div class="intel-block" id="h2hblock-${id}">
    <div class="intel-block-title">🔁 Last 5 Head-to-Head</div>
    <div class="empty-note" style="text-align:left;font-size:11px;padding:4px 0">H2H data loads via BDL stats.</div>
  </div>`;

  html += '</div>';
  el.innerHTML = html;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// GAME INTEL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function rIntel(id, data) {
  const el      = document.getElementById(`pane-intel-${id}`);
  const leaders = data.leaders || [];
  let html = '<div class="intel-list">';

  if (leaders.length) {
    html += '<div class="intel-block"><div class="intel-block-title">🏆 Leaders</div>';
    leaders.slice(0, 6).forEach(cat => {
      const l = cat.leaders?.[0];
      if (!l) return;
      html += `<div class="log-row">
        <div class="log-matchup">${safeText(cat.name || '')}</div>
        <div style="font-size:11px;color:var(--text2)">${safeText(l.athlete?.shortName || '?')}</div>
        <div style="font-family:var(--mono);font-size:12px;font-weight:600;color:var(--accent)">${safeText(l.displayValue || '')}</div>
      </div>`;
    });
    html += '</div>';
  } else {
    html += `<div class="intel-block">
      <div class="intel-block-title">🏆 Leaders</div>
      <div class="empty-note" style="text-align:left;padding:8px 0;font-size:11px">Leaders shown during & after games.</div>
    </div>`;
  }

  // Key matchup factors — use scoreboard data for records
  const comps   = data.header?.competitions?.[0]?.competitors || [];
  const home    = comps.find(c => c.homeAway === 'home') || {};
  const away    = comps.find(c => c.homeAway === 'away') || {};
  const scoreGame  = S.games.find(g => g.id === id) || {};
  const scoreComps = scoreGame.competitions?.[0]?.competitors || [];
  const scoreHome  = scoreComps.find(c => c.homeAway === 'home') || home;
  const scoreAway  = scoreComps.find(c => c.homeAway === 'away') || away;
  const homeRec = scoreHome.records?.[0]?.summary || home.records?.[0]?.summary || '0-0';
  const awayRec = scoreAway.records?.[0]?.summary || away.records?.[0]?.summary || '0-0';
  const homeW   = parseInt(homeRec.split('-')[0] || '0');
  const awayW   = parseInt(awayRec.split('-')[0] || '0');
  const favored = homeW > awayW ? safeText(home.team?.abbreviation||'HOME') : safeText(away.team?.abbreviation||'AWAY');
  const homeHomeRec = scoreHome.records?.[1]?.summary || home.records?.[1]?.summary || '?';
  const awayAwayRec = scoreAway.records?.[1]?.summary || away.records?.[1]?.summary || '?';

  html += `<div class="intel-block">
    <div class="intel-block-title">📋 Matchup Overview</div>
    <div class="log-row">
      <div class="log-matchup">Record advantage</div>
      <div style="font-family:var(--mono);font-size:11px;color:var(--accent)">${favored}</div>
    </div>
    <div class="log-row">
      <div class="log-matchup">${safeText(home.team?.abbreviation||'HOME')} overall</div>
      <div style="font-family:var(--mono);font-size:11px;">${safeText(homeRec)}</div>
    </div>
    <div class="log-row">
      <div class="log-matchup">${safeText(home.team?.abbreviation||'HOME')} home record</div>
      <div style="font-family:var(--mono);font-size:11px;">${safeText(homeHomeRec)}</div>
    </div>
    <div class="log-row">
      <div class="log-matchup">${safeText(away.team?.abbreviation||'AWAY')} overall</div>
      <div style="font-family:var(--mono);font-size:11px;">${safeText(awayRec)}</div>
    </div>
    <div class="log-row">
      <div class="log-matchup">${safeText(away.team?.abbreviation||'AWAY')} away record</div>
      <div style="font-family:var(--mono);font-size:11px;">${safeText(awayAwayRec)}</div>
    </div>
  </div>

  <div class="intel-block">
    <div class="intel-block-title">⚠ Pre-Game Checklist</div>
    <div class="why-item neg" style="padding:4px 0"><div class="why-dot"></div><span>Never lock a QUESTIONABLE or OUT player</span></div>
    <div class="why-item neg" style="padding:4px 0"><div class="why-dot"></div><span>Confirm lineups before tip-off (Lineups tab)</span></div>
    <div class="why-item neu" style="padding:4px 0"><div class="why-dot"></div><span>Away players avg ~5–15% less than home</span></div>
    <div class="why-item neu" style="padding:4px 0"><div class="why-dot"></div><span>Back-to-back game = significant efficiency drop</span></div>
    <div class="why-item pos" style="padding:4px 0"><div class="why-dot"></div><span>Check Projections tab for TAKE / AVOID verdicts</span></div>
  </div>`;

  html += '</div>';
  el.innerHTML = html;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PROP SHEET
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const PROPS = [
  {label:'Over 10.5 Points',  stat:'PTS', line:10.5},
  {label:'Over 15.5 Points',  stat:'PTS', line:15.5},
  {label:'Over 20.5 Points',  stat:'PTS', line:20.5},
  {label:'Over 25.5 Points',  stat:'PTS', line:25.5},
  {label:'Over 30.5 Points',  stat:'PTS', line:30.5},
  {label:'Over 3.5 Rebounds', stat:'REB', line:3.5},
  {label:'Over 6.5 Rebounds', stat:'REB', line:6.5},
  {label:'Over 9.5 Rebounds', stat:'REB', line:9.5},
  {label:'Over 3.5 Assists',  stat:'AST', line:3.5},
  {label:'Over 6.5 Assists',  stat:'AST', line:6.5},
  {label:'Over 9.5 Assists',  stat:'AST', line:9.5},
  {label:'Over 1.5 Threes',   stat:'3PM', line:1.5},
  {label:'Over 2.5 Threes',   stat:'3PM', line:2.5},
  {label:'Over 3.5 Threes',   stat:'3PM', line:3.5},
  {label:'Over 1.5 Steals',   stat:'STL', line:1.5},
  {label:'Over 1.5 Blocks',   stat:'BLK', line:1.5},
  {label:'Over 2.5 Turnovers',stat:'TO',  line:2.5},
  {label:'Over 25.5 Pts+Reb', stat:'PR',  line:25.5},
  {label:'Over 25.5 Pts+Ast', stat:'PA',  line:25.5},
  {label:'Double-Double',      stat:'DD',  line:1},
];

function showSheet(playerName, teamName, athleteId, sData=null) {
  const inner = document.getElementById('propSheetInner');
  let html = `<div class="modal-handle"></div>
    <div class="sheet-name">${safeText(playerName)}</div>
    <div class="sheet-sub">${safeText(teamName)} · PICK A PROP LINE</div><div>`;

  PROPS.forEach(p => {
    const already = S.parlayLegs.some(l => l.athleteId===athleteId && l.stat===p.stat && l.line===p.line);
    const v = sData ? pVerdict(p.stat, p.line, sData) : {cls:'tag-na', lbl:'—'};
    html += `<div class="prop-option" onclick="addLeg('${esc(playerName)}','${esc(teamName)}','${esc(athleteId)}','${esc(p.label)}','${p.stat}',${p.line})">
      <div class="po-label">${safeText(p.label)}</div>
      <div class="po-v">
        <span class="prop-tag ${v.cls}">${v.lbl}</span>
        ${already ? '<span style="font-size:9px;color:var(--text3);font-family:var(--mono)">ADDED</span>' : ''}
      </div>
    </div>`;
  });

  html += '</div><button class="cancel-sheet" onclick="document.getElementById(\'propSheet\').classList.remove(\'open\')">Cancel</button>';
  inner.innerHTML = html;
  document.getElementById('propSheet').classList.add('open');
}

function showSheetData(name, team, id, pts, reb, ast, thr) {
  showSheet(name, team, id, { pts, reb, ast, threes: thr });
}

function pVerdict(stat, line, d) {
  let avg = 0;
  if (stat==='PTS') avg = d.pts || 0;
  else if (stat==='REB') avg = d.reb || 0;
  else if (stat==='AST') avg = d.ast || 0;
  else if (stat==='3PM') avg = d.threes || 0;
  else return { cls:'tag-na', lbl:'—' };
  const r = avg / line;
  if (r >= 1.2) return { cls:'tag-take',  lbl:'TAKE' };
  if (r >= 0.9) return { cls:'tag-risky', lbl:'RISKY' };
  return { cls:'tag-avoid', lbl:'AVOID' };
}

function addLeg(name, team, aid, propLabel, stat, line) {
  document.getElementById('propSheet').classList.remove('open');
  if (S.parlayLegs.some(l => l.athleteId===aid && l.stat===stat)) return;
  S.parlayLegs.push({ playerName:name, teamName:team, athleteId:aid, propLabel, stat, line });
  updateFloat();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PARLAY BUILDER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function updateFloat() {
  const n = S.parlayLegs.length;
  document.getElementById('parlayBadge').textContent = n;
  document.getElementById('parlayFloat').classList.toggle('show', n > 0);
}

function openParlay() {
  renderParlay();
  document.getElementById('parlayOverlay').classList.add('open');
}

function oClick(e, id) {
  if (e.target === e.currentTarget) document.getElementById(id).classList.remove('open');
}

function renderParlay() {
  const le = document.getElementById('parlayLegs');
  const ae = document.getElementById('parlayAnalysis');
  if (!S.parlayLegs.length) {
    le.innerHTML = '<div class="empty-note">No props added yet.<br>Tap + on any player.</div>';
    ae.innerHTML = '';
    return;
  }
  le.innerHTML = S.parlayLegs.map((leg, i) => {
    const risky = isRisky(leg);
    return `<div class="parlay-leg">
      <div class="leg-info">
        <div class="leg-player">${safeText(leg.playerName)}</div>
        <div class="leg-prop">${safeText(leg.teamName)} · ${safeText(leg.propLabel)}</div>
      </div>
      <div class="leg-right">
        <span class="prop-tag ${risky?'tag-risky':'tag-take'}">${risky?'RISKY':'OK'}</span>
        <button class="remove-leg" onclick="removeLeg(${i})">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');

  const weak = S.parlayLegs.filter(isRisky);
  const n    = S.parlayLegs.length;
  const conf = Math.max(8, 88 - weak.length * 20 - (n > 4 ? (n - 4) * 8 : 0));
  const cls  = conf >= 65 ? 'av-good' : conf >= 40 ? 'av-warn' : 'av-bad';
  const txt  = conf >= 65
    ? `✓ Reasonable. ${n} legs, ~${conf}% combined confidence.`
    : conf >= 40
    ? `⚠ Risky. ${weak.length} weak leg${weak.length!==1?'s':''}: ${weak.map(l=>safeText(l.playerName.split(' ').pop())).join(', ')}. Consider removing.`
    : `✕ Don't lock this. ${weak.length}/${n} legs are high risk.`;

  ae.innerHTML = `<div class="parlay-analysis">
    <div class="a-row"><span class="a-label">Total legs</span><strong>${n}</strong></div>
    <div class="a-row"><span class="a-label">Risky legs</span><strong style="color:${weak.length?'var(--avoid)':'var(--take)'}">${weak.length}</strong></div>
    <div class="a-row"><span class="a-label">Est. confidence</span><strong style="color:${conf>=65?'var(--take)':conf>=40?'var(--risky)':'var(--avoid)'}">${conf}%</strong></div>
    <div class="a-verdict ${cls}">${txt}</div>
  </div>`;
}

function isRisky(l) {
  if (l.stat==='PTS' && l.line>=25) return true;
  if (l.stat==='REB' && l.line>=9)  return true;
  if (l.stat==='AST' && l.line>=8)  return true;
  if (l.stat==='3PM' && l.line>=3)  return true;
  if (l.stat==='STL' || l.stat==='BLK') return true;
  return false;
}

function removeLeg(i) {
  S.parlayLegs.splice(i, 1);
  updateFloat();
  renderParlay();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// AUTO REFRESH
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function startAutoRefresh() {
  if (S.refreshInterval) clearInterval(S.refreshInterval);
  S.refreshInterval = setInterval(() => {
    loadGames();
    if (S.activeGame) { delete S.gameCache[S.activeGame]; loadPanel(S.activeGame); }
  }, CFG.REFRESH_SEC * 1000);
}

function manualRefresh() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  if (S.refreshInterval) clearInterval(S.refreshInterval);
  loadGames().then(() => {
    if (S.activeGame) { delete S.gameCache[S.activeGame]; loadPanel(S.activeGame); }
    btn.classList.remove('spinning');
    startAutoRefresh();
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// INIT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
loadGames();
startAutoRefresh();
</script>
